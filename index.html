<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Arena 2D - Elite Warzone</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=JetBrains+Mono:wght@400;700&display=swap');
        
        :root {
            --primary: #10b981;
            --danger: #ef4444;
            --bg: #020617;
        }

        body {
            margin: 0;
            background-color: var(--bg);
            color: #f8fafc;
            font-family: 'Orbitron', sans-serif;
            overflow: hidden;
            touch-action: none;
            user-select: none;
        }

        canvas {
            display: block;
            cursor: crosshair;
        }

        /* --- UI OVERLAYS --- */
        .game-overlay {
            position: absolute;
            inset: 0;
            pointer-events: none;
        }

        /* Menu de Início */
        #menu {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle, rgba(16, 185, 129, 0.1) 0%, rgba(2, 6, 23, 1) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            pointer-events: auto;
        }

        .menu-card {
            background: rgba(15, 23, 42, 0.9);
            padding: 3rem;
            border-radius: 2rem;
            border: 2px solid rgba(16, 185, 129, 0.4);
            box-shadow: 0 0 80px rgba(0, 0, 0, 0.8), 0 0 20px rgba(16, 185, 129, 0.2);
            text-align: center;
            max-width: 450px;
            width: 100%;
        }

        /* HUD Principal */
        #hud {
            position: absolute;
            bottom: 30px;
            left: 30px;
            right: 30px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            pointer-events: none;
            z-index: 50;
        }

        .hud-panel {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 15px 25px;
            border-radius: 15px;
        }

        .hp-bar-outer {
            width: 250px;
            height: 12px;
            background: #0f172a;
            border-radius: 6px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            overflow: hidden;
            margin-top: 5px;
        }

        #hp-bar-inner {
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, #10b981, #34d399);
            transition: width 0.2s ease-out;
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.5);
        }

        /* Classificação */
        #leaderboard {
            position: absolute;
            top: 25px;
            right: 25px;
            background: rgba(15, 23, 42, 0.85);
            border: 1px solid rgba(16, 185, 129, 0.3);
            padding: 15px;
            border-radius: 12px;
            min-width: 220px;
            font-family: 'JetBrains Mono', monospace;
        }

        .weapon-slot {
            padding: 8px 12px;
            border-radius: 8px;
            background: #1e293b;
            border: 1px solid #334155;
            font-size: 10px;
            color: #94a3b8;
            transition: all 0.2s;
        }
        .weapon-slot.active {
            background: #064e3b;
            border-color: #10b981;
            color: white;
            transform: scale(1.1);
        }

        .kill-feed-container {
            position: absolute;
            top: 25px;
            left: 25px;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .kill-msg {
            background: rgba(239, 68, 68, 0.2);
            padding: 5px 15px;
            border-radius: 4px;
            border-left: 3px solid #ef4444;
            font-size: 12px;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        /* Dash Indicator */
        #dash-cooldown {
            position: relative;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #1e293b;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 15px;
        }
    </style>
</head>
<body>

    <!-- MENU INICIAL -->
    <div id="menu">
        <div class="menu-card animate-enter">
            <h1 class="text-5xl font-black mb-1 text-emerald-400 italic tracking-tighter">ELITE ARENA</h1>
            <p class="text-slate-400 text-xs mb-10 uppercase tracking-widest font-bold">Protocolo Warzone Online</p>
            
            <div class="space-y-4 mb-8">
                <input type="text" id="nickname" maxlength="10" placeholder="IDENTIFICAÇÃO" 
                       class="w-full p-4 bg-slate-950 border-2 border-slate-800 rounded-xl outline-none focus:border-emerald-500 text-center font-bold tracking-widest text-emerald-100 transition-all uppercase">
            </div>
            
            <button onclick="deploySoldier()" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-black py-5 rounded-xl transition-all transform active:scale-95 shadow-[0_6px_0_rgb(5,150,105)] active:shadow-none active:translate-y-1 text-xl tracking-widest">
                INICIAR DEPLOY
            </button>
            
            <div class="mt-10 grid grid-cols-2 gap-4 text-[10px] text-slate-500 uppercase font-bold">
                <div class="bg-slate-950 p-3 rounded-xl border border-slate-800">MOVIMENTAÇÃO: WASD</div>
                <div class="bg-slate-950 p-3 rounded-xl border border-slate-800">MIRAR: MOUSE</div>
                <div class="bg-slate-950 p-3 rounded-xl border border-slate-800">ATIRAR: CLIQUE</div>
                <div class="bg-slate-950 p-3 rounded-xl border border-slate-800">DASH: ESPAÇO</div>
            </div>
        </div>
    </div>

    <!-- HUD EM JOGO -->
    <div id="leaderboard">
        <div class="text-[10px] text-emerald-400 font-black uppercase mb-3 border-b border-emerald-500/20 pb-2 flex justify-between">
            <span>🏆 Ranking Global</span>
            <span>Kills</span>
        </div>
        <div id="leaderboard-list" class="space-y-1"></div>
    </div>

    <div id="kill-feed" class="kill-feed-container"></div>

    <div id="hud">
        <!-- Esquerda: HP e Nome -->
        <div class="flex items-end gap-6">
            <div class="hud-panel">
                <div class="flex justify-between items-center mb-1">
                    <span id="player-name-hud" class="text-xs font-bold text-slate-400 uppercase tracking-tighter">SISTEMAS ONLINE</span>
                    <span id="hp-text" class="text-sm font-black text-emerald-400 italic">100%</span>
                </div>
                <div class="hp-bar-outer">
                    <div id="hp-bar-inner"></div>
                </div>
            </div>
            <div class="hud-panel flex gap-4">
                <div class="text-center">
                    <div class="text-[8px] text-slate-500 font-bold uppercase mb-1">Combat Kills</div>
                    <div id="kills-val" class="text-2xl font-black text-white italic leading-none">0</div>
                </div>
            </div>
        </div>

        <!-- Direita: Armas e Munição -->
        <div class="flex items-end gap-3">
            <div id="dash-cooldown" class="border-2 border-slate-700">
                <span class="text-[10px] font-bold">SHIFT</span>
            </div>
            <div class="hud-panel flex gap-2" id="weapon-ui">
                <div class="weapon-slot" id="w-1">1: PISTOL</div>
                <div class="weapon-slot" id="w-2">2: SMG</div>
                <div class="weapon-slot" id="w-3">3: SHOTGUN</div>
                <div class="weapon-slot" id="w-4">4: SNIPER</div>
            </div>
            <div class="hud-panel min-w-[100px] text-right">
                <div class="text-[8px] text-slate-500 font-bold uppercase mb-1">Munição</div>
                <div id="ammo-val" class="text-3xl font-black text-emerald-400 italic leading-none">30</div>
            </div>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, push, remove, update, onChildAdded, onChildRemoved } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // --- CONFIGURAÇÃO FIREBASE ---
        const firebaseConfig = {
          apiKey: "AIzaSyD1IOecLLpWh-wKiSSy0XrsorKZDaMUaxM",
          authDomain: "blocky-fps.firebaseapp.com",
          projectId: "blocky-fps",
          storageBucket: "blocky-fps.firebasestorage.app",
          messagingSenderId: "513239085323",
          appId: "1:513239085323:web:2290f74dc9bb330388f20e",
          measurementId: "G-3J1SNCEW8B"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // --- CONSTANTES DE WEAPONS ---
        const WEAPONS = {
            1: { name: 'Pistol', damage: 20, fireRate: 400, ammo: Infinity, speed: 14, spread: 0.02, recoil: 2, count: 1, color: '#f59e0b' },
            2: { name: 'SMG', damage: 12, fireRate: 100, ammo: 90, speed: 16, spread: 0.1, recoil: 1.5, count: 1, color: '#10b981' },
            3: { name: 'Shotgun', damage: 15, fireRate: 800, ammo: 24, speed: 12, spread: 0.4, recoil: 8, count: 6, color: '#ef4444' },
            4: { name: 'Sniper', damage: 85, fireRate: 1500, ammo: 10, speed: 25, spread: 0, recoil: 15, count: 1, color: '#6366f1' }
        };

        // --- ESTADO DO JOGO ---
        let myId = null;
        let active = false;
        let players = {};
        let projectiles = [];
        let particles = [];
        let obstacles = [];
        let items = {};
        
        const keys = {};
        let mouseX = 0, mouseY = 0;

        // Dados Locais do Jogador
        let me = {
            x: 0, y: 0, angle: 0, hp: 100, kills: 0, name: "",
            weapon: 1, lastFired: 0, ammo: { 1: Infinity, 2: 90, 3: 24, 4: 10 },
            dashCooldown: 0, dashActive: 0, dashDir: {x:0, y:0},
            shake: 0, velX: 0, velY: 0
        };

        // Câmera
        let camera = { x: 0, y: 0, zoom: 1 };

        // --- INICIALIZAÇÃO ---
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        window.deploySoldier = () => {
            const nick = document.getElementById('nickname').value.trim() || "MERCENÁRIO";
            me.name = nick.toUpperCase();
            
            // Spawn em raio de 100px (Pedido pelo utilizador)
            const rad = Math.random() * 100;
            const ang = Math.random() * Math.PI * 2;
            me.x = rad * Math.cos(ang);
            me.y = rad * Math.sin(ang);

            myId = Math.random().toString(36).substring(7);
            const pRef = ref(db, `v2/players/${myId}`);
            
            set(pRef, {
                id: myId, name: me.name, x: me.x, y: me.y, 
                angle: 0, hp: 100, kills: 0, weapon: 1
            });

            document.getElementById('menu').style.display = 'none';
            document.getElementById('player-name-hud').innerText = me.name;
            active = true;

            window.onbeforeunload = () => remove(pRef);
            
            initListeners();
            generateMapLocal(); // Gera obstáculos decorativos localmente (ou sync se quiser)
            requestAnimationFrame(gameLoop);
        };

        function generateMapLocal() {
            // Gerar 20 blocos de cobertura ao redor do centro
            for(let i=0; i<25; i++) {
                obstacles.push({
                    x: (Math.random() - 0.5) * 2000,
                    y: (Math.random() - 0.5) * 2000,
                    w: 40 + Math.random() * 60,
                    h: 40 + Math.random() * 60
                });
            }
        }

        // --- LISTENERS ---
        function initListeners() {
            window.addEventListener('keydown', e => {
                keys[e.code] = true;
                if(e.code === 'Digit1') switchWeapon(1);
                if(e.code === 'Digit2') switchWeapon(2);
                if(e.code === 'Digit3') switchWeapon(3);
                if(e.code === 'Digit4') switchWeapon(4);
                if(e.code === 'Space') triggerDash();
            });
            window.addEventListener('keyup', e => keys[e.code] = false);
            window.addEventListener('mousemove', e => {
                mouseX = e.clientX;
                mouseY = e.clientY;
            });
            window.addEventListener('mousedown', () => keys.MouseDown = true);
            window.addEventListener('mouseup', () => keys.MouseDown = false);

            // Sincronização de Jogadores
            onValue(ref(db, 'v2/players'), (snap) => {
                players = snap.val() || {};
                updateLeaderboard();
                if(myId && players[myId]) {
                    if(players[myId].hp <= 0 && me.hp > 0) handleDeath();
                    me.kills = players[myId].kills;
                }
            });

            // Sincronização de Projéteis (Eventos de tiro)
            onChildAdded(ref(db, 'v2/shots'), (snap) => {
                const s = snap.val();
                if(s.owner !== myId) {
                    createProjectile(s, false);
                }
                // Limpeza rápida do nó de tiro para não pesar o DB
                remove(ref(db, `v2/shots/${snap.key}`));
            });

            // Sincronização de Itens (Cura/Ammo)
            onValue(ref(db, 'v2/items'), (snap) => { items = snap.val() || {}; });
        }

        function switchWeapon(id) {
            me.weapon = id;
            const slots = document.querySelectorAll('.weapon-slot');
            slots.forEach(s => s.classList.remove('active'));
            document.getElementById(`w-${id}`).classList.add('active');
            updateAmmoUI();
        }

        function updateAmmoUI() {
            const val = me.ammo[me.weapon];
            document.getElementById('ammo-val').innerText = val === Infinity ? '∞' : val;
        }

        function triggerDash() {
            if(me.dashCooldown > 0 || me.hp <= 0) return;
            me.dashActive = 15; // frames de dash
            me.dashCooldown = 120; // 2 segundos aprox
            // Direção do dash baseada nas teclas ou no mouse? Vamos usar direção do movimento
            let dx = 0, dy = 0;
            if(keys.KeyW) dy -= 1; if(keys.KeyS) dy += 1;
            if(keys.KeyA) dx -= 1; if(keys.KeyD) dx += 1;
            if(dx === 0 && dy === 0) { // Se parado, dash para onde aponta
                dx = Math.cos(me.angle); dy = Math.sin(me.angle);
            }
            const mag = Math.hypot(dx, dy);
            me.dashDir = { x: dx/mag, y: dy/mag };
            spawnParticles(me.x, me.y, '#ffffff', 10);
        }

        // --- LÓGICA CORE ---
        function update() {
            if(!active || me.hp <= 0) return;

            // 1. Movimentação com Colisão
            let moveX = 0, moveY = 0;
            const speed = me.dashActive > 0 ? 15 : 4.5;
            
            if(me.dashActive > 0) {
                moveX = me.dashDir.x * speed;
                moveY = me.dashDir.y * speed;
                me.dashActive--;
            } else {
                if(keys.KeyW) moveY -= speed; if(keys.KeyS) moveY += speed;
                if(keys.KeyA) moveX -= speed; if(keys.KeyD) moveX += speed;
                if(moveX !== 0 && moveY !== 0) {
                    moveX *= 0.707; moveY *= 0.707; // Normalização
                }
            }

            // Colisão com Obstáculos
            const nextX = me.x + moveX;
            const nextY = me.y + moveY;
            let collideX = false, collideY = false;

            for(const obj of obstacles) {
                if(checkRectCircle(obj, nextX, me.y, 18)) collideX = true;
                if(checkRectCircle(obj, me.x, nextY, 18)) collideY = true;
            }

            if(!collideX) me.x = nextX;
            if(!collideY) me.y = nextY;

            // 2. Mira
            const screenCenterX = canvas.width / 2;
            const screenCenterY = canvas.height / 2;
            me.angle = Math.atan2(mouseY - screenCenterY, mouseX - screenCenterX);

            // 3. Tiro
            const w = WEAPONS[me.weapon];
            if(keys.MouseDown && Date.now() - me.lastFired > w.fireRate && me.ammo[me.weapon] > 0) {
                fireWeapon();
            }

            // 4. Cooldowns e HP
            if(me.dashCooldown > 0) me.dashCooldown--;
            document.getElementById('dash-cooldown').style.opacity = me.dashCooldown > 0 ? 0.3 : 1;
            
            if(me.shake > 0) me.shake *= 0.9;

            // 5. Verificação de Itens (Pickups)
            for(let id in items) {
                const item = items[id];
                const d = Math.hypot(me.x - item.x, me.y - item.y);
                if(d < 30) {
                    collectItem(id, item);
                }
            }

            // 6. Sincronizar com Firebase (Throttle opcional, aqui direto)
            update(ref(db, `v2/players/${myId}`), {
                x: me.x, y: me.y, angle: me.angle, hp: me.hp, weapon: me.weapon
            });

            updateCamera();
            updateProjectiles();
            updateParticles();
        }

        function fireWeapon() {
            const w = WEAPONS[me.weapon];
            me.lastFired = Date.now();
            if(w.ammo !== Infinity) me.ammo[me.weapon]--;
            updateAmmoUI();

            // Screen Shake
            me.shake = w.recoil;

            // Criar tiros
            for(let i=0; i < w.count; i++) {
                const spreadAng = me.angle + (Math.random() - 0.5) * w.spread;
                const shotData = {
                    owner: myId,
                    x: me.x + Math.cos(me.angle) * 20,
                    y: me.y + Math.sin(me.angle) * 20,
                    angle: spreadAng,
                    weapon: me.weapon,
                    time: Date.now()
                };
                
                // Envia sinal de tiro para rede
                push(ref(db, 'v2/shots'), shotData);
                // Cria localmente para feedback instantâneo
                createProjectile(shotData, true);
            }

            // Partículas de fumaça no cano
            spawnParticles(me.x + Math.cos(me.angle) * 25, me.y + Math.sin(me.angle) * 25, '#94a3b8', 3);
        }

        function createProjectile(data, isLocal) {
            const w = WEAPONS[data.weapon];
            projectiles.push({
                ...data,
                speed: w.speed,
                damage: w.damage,
                local: isLocal,
                dist: 0,
                color: w.color
            });
        }

        function updateProjectiles() {
            projectiles = projectiles.filter(p => {
                p.x += Math.cos(p.angle) * p.speed;
                p.y += Math.sin(p.angle) * p.speed;
                p.dist += p.speed;

                // Colisão com Obstáculos
                for(const obj of obstacles) {
                    if(p.x > obj.x && p.x < obj.x + obj.w && p.y > obj.y && p.y < obj.y + obj.h) {
                        spawnParticles(p.x, p.y, '#475569', 5);
                        return false;
                    }
                }

                // Colisão com Jogadores (Apenas as MINHAS balas processam dano nos OUTROS)
                if(p.local) {
                    for(let id in players) {
                        if(id !== myId && players[id].hp > 0) {
                            const enemy = players[id];
                            const d = Math.hypot(p.x - enemy.x, p.y - enemy.y);
                            if(d < 25) {
                                damageEnemy(id, p.damage);
                                spawnParticles(p.x, p.y, '#ef4444', 8);
                                return false;
                            }
                        }
                    }
                }

                return p.dist < 1200;
            });
        }

        function damageEnemy(id, dmg) {
            const enemy = players[id];
            const newHp = Math.max(0, enemy.hp - dmg);
            const updates = {};
            updates[`v2/players/${id}/hp`] = newHp;
            
            if(newHp === 0 && enemy.hp > 0) {
                // Registro de Kill
                me.kills++;
                updates[`v2/players/${myId}/kills`] = me.kills;
                notifyKill(me.name, enemy.name);
            }
            update(ref(db), updates);
        }

        function collectItem(id, item) {
            if(item.type === 'hp') me.hp = Math.min(100, me.hp + 40);
            if(item.type === 'ammo') {
                me.ammo[2] += 60; me.ammo[3] += 12; me.ammo[4] += 5;
                updateAmmoUI();
            }
            remove(ref(db, `v2/items/${id}`));
            spawnParticles(me.x, me.y, item.type === 'hp' ? '#10b981' : '#f59e0b', 15);
        }

        function handleDeath() {
            active = false;
            me.hp = 0;
            spawnParticles(me.x, me.y, '#ef4444', 40);
            setTimeout(() => {
                const spawn = { x: (Math.random()-0.5)*200, y: (Math.random()-0.5)*200 };
                me.x = spawn.x; me.y = spawn.y;
                me.hp = 100;
                me.ammo = { 1: Infinity, 2: 90, 3: 24, 4: 10 };
                active = true;
                update(ref(db, `v2/players/${myId}`), { x: me.x, y: me.y, hp: 100 });
                updateAmmoUI();
            }, 2000);
        }

        // --- SISTEMA DE PARTÍCULAS ---
        function spawnParticles(x, y, color, count) {
            for(let i=0; i<count; i++) {
                particles.push({
                    x, y,
                    vx: (Math.random() - 0.5) * 8,
                    vy: (Math.random() - 0.5) * 8,
                    life: 1.0,
                    decay: 0.02 + Math.random() * 0.03,
                    color: color,
                    size: 2 + Math.random() * 4
                });
            }
        }

        function updateParticles() {
            particles = particles.filter(p => {
                p.x += p.vx; p.y += p.vy;
                p.life -= p.decay;
                return p.life > 0;
            });
        }

        // --- UTILITÁRIOS ---
        function checkRectCircle(rect, cx, cy, radius) {
            const closestX = Math.max(rect.x, Math.min(cx, rect.x + rect.w));
            const closestY = Math.max(rect.y, Math.min(cy, rect.y + rect.h));
            const distance = Math.hypot(cx - closestX, cy - closestY);
            return distance < radius;
        }

        function updateCamera() {
            const targetX = me.x;
            const targetY = me.y;
            camera.x += (targetX - camera.x) * 0.1;
            camera.y += (targetY - camera.y) * 0.1;
        }

        function updateLeaderboard() {
            const sorted = Object.values(players).sort((a,b) => b.kills - a.kills).slice(0, 5);
            const list = document.getElementById('leaderboard-list');
            list.innerHTML = sorted.map((p, i) => `
                <div class="flex justify-between items-center text-xs ${p.id === myId ? 'text-emerald-400 font-bold' : 'text-slate-400'}">
                    <span>${i+1}. ${p.name}</span>
                    <span>${p.kills}</span>
                </div>
            `).join('');

            // Atualiza HUD de Vida
            if(myId && players[myId]) {
                const hp = players[myId].hp;
                me.hp = hp;
                document.getElementById('hp-bar-inner').style.width = hp + '%';
                document.getElementById('hp-text').innerText = hp + '%';
                document.getElementById('kills-val').innerText = me.kills;
                
                const bar = document.getElementById('hp-bar-inner');
                if(hp < 30) bar.style.background = '#ef4444';
                else if(hp < 60) bar.style.background = '#f59e0b';
                else bar.style.background = '#10b981';
            }
        }

        function notifyKill(killer, victim) {
            const feed = document.getElementById('kill-feed');
            const el = document.createElement('div');
            el.className = 'kill-msg';
            el.innerHTML = `<span class="font-black text-white">${killer}</span> <span class="text-slate-400 italic">eliminou</span> <span class="text-red-400">${victim}</span>`;
            feed.appendChild(el);
            setTimeout(() => el.remove(), 4000);
        }

        // --- RENDERIZAÇÃO ---
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Aplicação de Camera e Shake
            ctx.save();
            const sx = (Math.random() - 0.5) * me.shake;
            const sy = (Math.random() - 0.5) * me.shake;
            ctx.translate(canvas.width/2 - camera.x + sx, canvas.height/2 - camera.y + sy);

            // 1. Desenhar Chão (Grid)
            drawGrid();

            // 2. Desenhar Obstáculos
            ctx.fillStyle = '#1e293b';
            ctx.strokeStyle = '#334155';
            ctx.lineWidth = 2;
            obstacles.forEach(o => {
                ctx.fillRect(o.x, o.y, o.w, o.h);
                ctx.strokeRect(o.x, o.y, o.w, o.h);
                // Sombra de profundidade
                ctx.fillStyle = 'rgba(0,0,0,0.2)';
                ctx.fillRect(o.x + o.w, o.y + 10, 10, o.h);
                ctx.fillStyle = '#1e293b';
            });

            // 3. Desenhar Itens (Pickups)
            for(let id in items) {
                const item = items[id];
                ctx.save();
                ctx.translate(item.x, item.y);
                ctx.rotate(Date.now() / 1000);
                ctx.fillStyle = item.type === 'hp' ? '#10b981' : '#f59e0b';
                ctx.shadowBlur = 15;
                ctx.shadowColor = ctx.fillStyle;
                ctx.fillRect(-10, -10, 20, 20);
                ctx.restore();
            }

            // 4. Desenhar Outros Jogadores
            for(let id in players) {
                if(id === myId || players[id].hp <= 0) continue;
                drawSoldier(players[id], false);
            }

            // 5. Desenhar Eu
            if(me.hp > 0) drawSoldier(me, true);

            // 6. Desenhar Projéteis
            projectiles.forEach(p => {
                ctx.beginPath();
                ctx.strokeStyle = p.color;
                ctx.lineWidth = 3;
                ctx.lineCap = 'round';
                ctx.moveTo(p.x, p.y);
                ctx.lineTo(p.x - Math.cos(p.angle)*15, p.y - Math.sin(p.angle)*15);
                ctx.stroke();
                // Brilho
                ctx.shadowBlur = 8;
                ctx.shadowColor = p.color;
            });

            // 7. Desenhar Partículas
            particles.forEach(p => {
                ctx.globalAlpha = p.life;
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
                ctx.fill();
            });

            ctx.restore();
        }

        function drawGrid() {
            const step = 80;
            const startX = Math.floor((camera.x - canvas.width) / step) * step;
            const endX = Math.ceil((camera.x + canvas.width) / step) * step;
            const startY = Math.floor((camera.y - canvas.height) / step) * step;
            const endY = Math.ceil((camera.y + canvas.height) / step) * step;

            ctx.strokeStyle = '#0f172a';
            ctx.lineWidth = 1;
            for (let x = startX; x <= endX; x += step) {
                ctx.beginPath(); ctx.moveTo(x, startY); ctx.lineTo(x, endY); ctx.stroke();
            }
            for (let y = startY; y <= endY; y += step) {
                ctx.beginPath(); ctx.moveTo(startX, y); ctx.lineTo(endX, y); ctx.stroke();
            }
        }

        function drawSoldier(p, isMe) {
            ctx.save();
            ctx.translate(p.x, p.y);
            
            // Nome e Barra
            ctx.textAlign = 'center';
            ctx.font = 'bold 10px Orbitron';
            ctx.fillStyle = isMe ? '#10b981' : '#fff';
            ctx.fillText(p.name, 0, -35);
            
            // Mini barra
            ctx.fillStyle = '#000';
            ctx.fillRect(-15, -30, 30, 3);
            ctx.fillStyle = p.hp > 30 ? '#10b981' : '#ef4444';
            ctx.fillRect(-15, -30, (p.hp/100)*30, 3);

            // Rotação do Corpo
            ctx.rotate(p.angle);
            
            // Desenhar Arma
            ctx.fillStyle = '#334155';
            const w = WEAPONS[p.weapon];
            ctx.fillRect(15, -3, 20, 6);
            if(p.weapon == 4) ctx.fillRect(15, -4, 35, 8); // Sniper longa
            if(p.weapon == 3) ctx.fillRect(15, -5, 18, 10); // Shotgun larga

            // Sombras de Mãos
            ctx.fillStyle = '#1e293b';
            ctx.beginPath(); ctx.arc(12, 12, 6, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(12, -12, 6, 0, Math.PI*2); ctx.fill();

            // Corpo (Círculo)
            const grad = ctx.createRadialGradient(0,0, 5, 0,0, 20);
            grad.addColorStop(0, isMe ? '#10b981' : '#ef4444');
            grad.addColorStop(1, isMe ? '#064e3b' : '#7f1d1d');
            
            ctx.fillStyle = grad;
            ctx.beginPath();
            ctx.arc(0, 0, 18, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 2;
            ctx.stroke();

            // Detalhe de Visor
            ctx.fillStyle = 'rgba(255,255,255,0.3)';
            ctx.beginPath();
            ctx.arc(8, 0, 8, -Math.PI/2, Math.PI/2);
            ctx.fill();

            ctx.restore();
        }

        // --- LOOP PRINCIPAL ---
        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        // --- SISTEMA DE ITENS EM REDE (Host-like mas distribuído) ---
        setInterval(() => {
            if(myId && active && Object.keys(items).length < 5) {
                // Apenas um jogador tenta criar itens para não inundar o DB
                if(Math.random() < 0.1) {
                    const id = Math.random().toString(36).substring(7);
                    set(ref(db, `v2/items/${id}`), {
                        id,
                        x: (Math.random()-0.5)*1800,
                        y: (Math.random()-0.5)*1800,
                        type: Math.random() > 0.5 ? 'hp' : 'ammo'
                    });
                }
            }
        }, 3000);

    </script>
