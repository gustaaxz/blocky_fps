<!DOCTYPE html>
<html lang="pt-PT">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Arena 2D - Elite Warzone</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=JetBrains+Mono:wght@400;700&display=swap');

        :root {
            --primary: #10b981;
            --danger: #ef4444;
            --bg: #020617;
        }

        body {
            margin: 0;
            background-color: var(--bg);
            color: #f8fafc;
            font-family: 'Orbitron', sans-serif;
            overflow: hidden;
            touch-action: none;
            user-select: none;
        }

        canvas {
            display: block;
            cursor: crosshair;
        }

        /* --- UI OVERLAYS --- */
        .ui-screen {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle, rgba(16, 185, 129, 0.05) 0%, rgba(2, 6, 23, 1) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            pointer-events: auto;
            backdrop-filter: blur(5px);
        }

        .menu-card {
            background: rgba(15, 23, 42, 0.95);
            padding: 2.5rem;
            border-radius: 1.5rem;
            border: 2px solid rgba(16, 185, 129, 0.3);
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.9);
            text-align: center;
            max-width: 500px;
            width: 100%;
        }

        /* Lobby Styles */
        .room-item {
            background: rgba(30, 41, 59, 0.5);
            border: 1px solid #334155;
            padding: 12px 20px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            transition: all 0.2s;
        }

        .room-item:hover {
            border-color: var(--primary);
            background: rgba(16, 185, 129, 0.1);
        }

        #hud {
            position: absolute;
            bottom: 30px;
            left: 30px;
            right: 30px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            pointer-events: none;
            z-index: 50;
        }

        .hud-panel {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 15px 25px;
            border-radius: 15px;
        }

        .hp-bar-outer {
            width: 250px;
            height: 12px;
            background: #0f172a;
            border-radius: 6px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            overflow: hidden;
            margin-top: 5px;
        }

        #hp-bar-inner {
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, #10b981, #34d399);
            transition: width 0.2s ease-out;
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.5);
        }

        #leaderboard {
            position: absolute;
            top: 25px;
            right: 25px;
            background: rgba(15, 23, 42, 0.85);
            border: 1px solid rgba(16, 185, 129, 0.3);
            padding: 15px;
            border-radius: 12px;
            min-width: 220px;
        }

        .weapon-slot {
            padding: 8px 12px;
            border-radius: 8px;
            background: #1e293b;
            border: 1px solid #334155;
            font-size: 10px;
            color: #94a3b8;
        }

        .weapon-slot.active {
            background: #064e3b;
            border-color: #10b981;
            color: white;
            transform: scale(1.1);
        }

        .kill-msg {
            background: rgba(239, 68, 68, 0.2);
            padding: 5px 15px;
            border-radius: 4px;
            border-left: 3px solid #ef4444;
            font-size: 12px;
            margin-bottom: 5px;
        }

        input {
            text-transform: uppercase;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>

<body>

    <!-- 1. TELA DE NICKNAME -->
    <div id="screen-nick" class="ui-screen">
        <div class="menu-card">
            <h1 class="text-5xl font-black mb-1 text-emerald-400 italic tracking-tighter">ELITE ARENA</h1>
            <p class="text-slate-400 text-xs mb-10 uppercase tracking-widest font-bold">Identificação Necessária</p>
            <input type="text" id="nickname" maxlength="10" placeholder="SEU NOME"
                class="w-full p-4 bg-slate-950 border-2 border-slate-800 rounded-xl outline-none focus:border-emerald-500 text-center font-bold tracking-widest text-emerald-100 transition-all">
            <button onclick="goToLobby()"
                class="w-full mt-6 bg-emerald-600 hover:bg-emerald-500 text-white font-black py-5 rounded-xl shadow-[0_6px_0_rgb(5,150,105)] active:translate-y-1 active:shadow-none transition-all">
                PRÓXIMO
            </button>
        </div>
    </div>

    <!-- 2. LOBBY DE SALAS -->
    <div id="screen-lobby" class="ui-screen hidden">
        <div class="menu-card max-w-[600px]">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-bold text-white italic">SALAS DISPONÍVEIS</h2>
                <button onclick="openCreateRoom()"
                    class="bg-emerald-600 text-[10px] font-black px-4 py-2 rounded-lg hover:bg-emerald-500 transition-all">+
                    CRIAR SALA</button>
            </div>

            <div id="room-list" class="max-h-[300px] overflow-y-auto mb-6 pr-2">
                <p class="text-slate-500 py-10">A procurar servidores...</p>
            </div>

            <div class="text-[10px] text-slate-500 font-bold uppercase tracking-widest">
                Soldado Identificado: <span id="display-nick" class="text-emerald-400">---</span>
            </div>
        </div>
    </div>

    <!-- 3. CRIAR SALA -->
    <div id="screen-create" class="ui-screen hidden">
        <div class="menu-card">
            <h2 class="text-3xl font-black mb-6 text-white italic">NOVA OPERAÇÃO</h2>
            <div class="space-y-4 text-left">
                <div>
                    <label class="text-[10px] text-slate-400 font-bold ml-1">NOME DA SALA</label>
                    <input type="text" id="new-room-name" placeholder="EX: ARENA ALFA"
                        class="w-full p-4 bg-slate-950 border-2 border-slate-800 rounded-xl outline-none focus:border-emerald-500 text-white font-bold">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-[10px] text-slate-400 font-bold ml-1">MAX JOGADORES</label>
                        <select id="new-room-max"
                            class="w-full p-4 bg-slate-950 border-2 border-slate-800 rounded-xl outline-none focus:border-emerald-500 text-white font-bold appearance-none">
                            <option value="2">2</option>
                            <option value="4">4</option>
                            <option value="6">6</option>
                            <option value="8" selected>8</option>
                            <option value="10">10</option>
                        </select>
                    </div>
                    <div>
                        <label class="text-[10px] text-slate-400 font-bold ml-1">SENHA (OPCIONAL)</label>
                        <input type="password" id="new-room-pass" placeholder="VAZIO"
                            class="w-full p-4 bg-slate-950 border-2 border-slate-800 rounded-xl outline-none focus:border-emerald-500 text-white font-bold">
                    </div>
                </div>
                <div class="mt-4 flex items-center gap-2">
                    <input type="checkbox" id="new-room-tdm" class="w-5 h-5 accent-emerald-500">
                    <label class="text-sm text-slate-300 font-bold">MATA-MATA EM EQUIPE (TDM)</label>
                </div>
            </div>
            <div class="flex gap-4 mt-8">
                <button onclick="backToLobby()"
                    class="flex-1 bg-slate-800 text-white font-black py-4 rounded-xl hover:bg-slate-700 transition-all">CANCELAR</button>
                <button onclick="createRoomNow()"
                    class="flex-1 bg-emerald-600 text-white font-black py-4 rounded-xl hover:bg-emerald-500 shadow-[0_4px_0_rgb(5,150,105)] active:translate-y-1 transition-all">DEPLOYAR</button>
            </div>
        </div>
    </div>

    <!-- 4. TELA DE MORTE -->
    <div id="screen-death" class="ui-screen hidden">
        <div class="menu-card">
            <h1 class="text-5xl font-black mb-1 text-red-500 italic tracking-tighter">ELIMINADO</h1>
            <p class="text-slate-400 text-xs mb-10 uppercase tracking-widest font-bold">REPOSICIONANDO EM BREVE</p>
            <div id="respawn-timer" class="text-7xl font-black text-white italic">5</div>
        </div>
    </div>

    <!-- 5. SCOREBOARD & CHAT -->
    <div id="tab-scoreboard" class="hidden" style="position: absolute; inset: 10%; background: rgba(15,23,42,0.95); border: 2px solid #10b981; border-radius: 10px; z-index: 2000; padding: 20px; color: white;">
        <h2 class="text-3xl font-black mb-4 text-emerald-400 italic text-center">PLACAR DE OPERAÇÕES</h2>
        <div id="tab-list" class="space-y-2"></div>
    </div>

    <div id="chat-container" class="hidden" style="position: absolute; left: 20px; bottom: 150px; width: 300px; background: rgba(0,0,0,0.5); border-radius: 8px; padding: 10px; pointer-events: auto; z-index: 100;">
        <div id="chat-messages" style="height: 100px; overflow-y: auto; color: white; font-size: 12px; margin-bottom: 5px; display: flex; flex-direction: column-reverse;"></div>
        <input type="text" id="chat-input" placeholder="Pressione T para falar..." style="width: 100%; background: rgba(0,0,0,0.8); border: 1px solid #10b981; color: white; padding: 5px; outline: none; border-radius: 4px; font-size: 12px; text-transform: none;">
    </div>
    
    <button onclick="toggleAudio()" id="audio-btn" class="hidden hud-panel !bg-slate-900/50 hover:bg-slate-700 !pointer-events-auto transition-all text-xs font-black" style="position: absolute; top: 20px; left: 20px; z-index: 50;">🔇 AUDIO OFF</button>
    
    <!-- HUD EM JOGO -->
    <div id="leaderboard" class="hidden">
        <div
            class="text-[10px] text-emerald-400 font-black uppercase mb-3 border-b border-emerald-500/20 pb-2 flex justify-between">
            <span>🏆 Ranking Sala</span>
            <span>Kills</span>
        </div>
        <div id="leaderboard-list" class="space-y-1"></div>
    </div>

    <div id="kill-feed" class="kill-feed-container"></div>

    <div id="hud" class="hidden">
        <div class="flex items-end gap-6">
            <div class="hud-panel">
                <div class="flex justify-between items-center mb-1">
                    <span id="player-name-hud"
                        class="text-xs font-bold text-slate-400 uppercase tracking-tighter">SISTEMAS ONLINE</span>
                    <span id="hp-text" class="text-sm font-black text-emerald-400 italic">100%</span>
                </div>
                <div class="hp-bar-outer">
                    <div id="hp-bar-inner"></div>
                </div>
            </div>
            <div class="hud-panel">
                <div id="kills-val" class="text-2xl font-black text-white italic">0</div>
            </div>
        </div>
        <div class="flex items-end gap-3">
            <div class="hud-panel flex gap-2" id="weapon-ui">
                <div class="weapon-slot active" id="w-1">1</div>
                <div class="weapon-slot" id="w-2">2</div>
                <div class="weapon-slot" id="w-3">3</div>
                <div class="weapon-slot" id="w-4">4</div>
                <div class="weapon-slot" id="w-5">5</div>
            </div>
            <div class="hud-panel min-w-[80px] text-right flex flex-col justify-center">
                <div id="ammo-val" class="text-2xl font-black text-emerald-400 italic leading-none whitespace-nowrap">12 / ∞</div>
                <div class="text-[10px] text-emerald-400/50 font-black mt-1 uppercase">Munição (R) | Granadas (G): <span id="grenade-val">3</span></div>
            </div>
            <div class="hud-panel min-w-[80px] text-right flex flex-col justify-center">
                <div class="text-[10px] text-emerald-400 font-black uppercase mb-1 leading-none">TEMPO</div>
                <div id="match-timer" class="text-xl font-black text-white italic leading-none">15:00</div>
            </div>
            <button onclick="leaveRoom()"
                class="hud-panel !bg-red-900/50 hover:bg-red-600 !pointer-events-auto transition-all text-xs font-black">SAIR</button>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, push, remove, update as fbUpdate, onChildAdded, onDisconnect, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        function mulberry32(a) {
            return function() {
                var t = a += 0x6D2B79F5;
                t = Math.imul(t ^ t >>> 15, t | 1);
                t ^= t + Math.imul(t ^ t >>> 7, t | 61);
                return ((t ^ t >>> 14) >>> 0) / 4294967296;
            }
        }
        function hashCode(str) {
            let hash = 0;
            for (let i = 0, len = str.length; i < len; i++) {
                let chr = str.charCodeAt(i);
                hash = (hash << 5) - hash + chr;
                hash |= 0;
            }
            return hash;
        }

        // =========================================================================
        // ⚠️ CONFIGURAÇÃO OBRIGATÓRIA DO FIREBASE ⚠️
        // =========================================================================
        const firebaseConfig = {
            apiKey: "AIzaSyD1IOecLLpWh-wKiSSy0XrsorKZDaMUaxM",
            authDomain: "blocky-fps.firebaseapp.com",
            projectId: "blocky-fps",
            storageBucket: "blocky-fps.firebasestorage.app",
            messagingSenderId: "513239085323",
            appId: "1:513239085323:web:2290f74dc9bb330388f20e",
            // COPIE O LINK DO SEU REALTIME DATABASE E COLE ABAIXO:
            databaseURL: "https://blocky-fps-default-rtdb.firebaseio.com"
        };

        // Verificação de Segurança
        if (firebaseConfig.databaseURL.includes("COLE_AQUI")) {
            alert("ERRO CRÍTICO: Está a faltar o link do 'databaseURL' no seu código!\n\nVá ao painel do Firebase > Realtime Database e copie o link que aparece no topo.");
        }

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        const WEAPONS = {
            1: { fireRate: 400, ammo: Infinity, speed: 14, spread: 0.02, recoil: 2, count: 1, color: '#f59e0b', damage: 20, clip: 12, reload: 1000 },
            2: { fireRate: 100, ammo: 150, speed: 16, spread: 0.1, recoil: 1.5, count: 1, color: '#10b981', damage: 12, clip: 30, reload: 1500 },
            3: { fireRate: 800, ammo: 30, speed: 12, spread: 0.4, recoil: 8, count: 6, color: '#ef4444', damage: 15, clip: 6, reload: 2000 },
            4: { fireRate: 1500, ammo: 10, speed: 28, spread: 0, recoil: 15, count: 1, color: '#6366f1', damage: 85, clip: 5, reload: 2500, laser: true },
            5: { fireRate: 2000, ammo: 5, speed: 4, accel: 1.05, spread: 0, recoil: 20, count: 1, color: '#fbbf24', damage: 100, isAoE: true, clip: 1, reload: 3000 }
        };

        let myId = null, currentRoomId = null;
        let players = {}, projectiles = [], particles = [], obstacles = [], items = {}, explosions = [], bushes = [], blood = [];
        const MAP_SIZE = 2000;
        const keys = {};
        let mouseX = 0, mouseY = 0;

        let me = {
            x: 0, y: 0, angle: 0, hp: 100, targetHp: 100, kills: 0, name: "",
            weapon: 1, lastFired: 0, ammo: { 1: Infinity, 2: 150, 3: 30, 4: 10, 5: 5 },
            clip: { 1: 12, 2: 30, 3: 6, 4: 5, 5: 1 },
            dashCooldown: 0, dashTimer: 0, dashAngle: 0, reloading: 0, grenades: 3,
            shake: 0, lastHp: 100, hitFlash: 0, killerPos: null, streak: 0, rank: 'RECRUTA'
        };
        
        let myXp = parseInt(localStorage.getItem('blocky_xp') || '0');
        function getRank(xp) {
            if (xp > 100) return 'LENDÁRIO';
            if (xp > 50) return 'GENERAL';
            if (xp > 20) return 'SARGENTO';
            if (xp > 5) return 'SOLDADO';
            return 'RECRUTA';
        }
        
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        let audioEnabled = false;
        window.toggleAudio = () => {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            audioEnabled = !audioEnabled;
            document.getElementById('audio-btn').innerText = audioEnabled ? '🔊 AUDIO ON' : '🔇 AUDIO OFF';
            if (audioEnabled && !window.bgmOsc) {
                window.bgmOsc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                window.bgmOsc.type = 'triangle';
                window.bgmOsc.frequency.setValueAtTime(60, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.01, audioCtx.currentTime);
                window.bgmOsc.connect(gain); gain.connect(audioCtx.destination);
                window.bgmOsc.start();
            } else if (!audioEnabled && window.bgmOsc) {
                window.bgmOsc.stop(); window.bgmOsc = null;
            }
        };

        function playSound(type) {
            if (!audioEnabled || audioCtx.state === 'suspended') return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            const now = audioCtx.currentTime;
            
            if (type === 'shoot') {
                osc.type = 'square'; osc.frequency.setValueAtTime(300, now); osc.frequency.exponentialRampToValueAtTime(100, now + 0.1);
                gain.gain.setValueAtTime(0.02, now); gain.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
                osc.start(now); osc.stop(now + 0.1);
            } else if (type === 'hit') {
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(150, now); osc.frequency.exponentialRampToValueAtTime(50, now + 0.2);
                gain.gain.setValueAtTime(0.05, now); gain.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
                osc.start(now); osc.stop(now + 0.2);
            } else if (type === 'explosion') {
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(100, now); osc.frequency.exponentialRampToValueAtTime(20, now + 0.5);
                gain.gain.setValueAtTime(0.1, now); gain.gain.exponentialRampToValueAtTime(0.001, now + 0.5);
                osc.start(now); osc.stop(now + 0.5);
            }
        }

        let camera = { x: 0, y: 0 };
        let active = false;
        let roomStartTime = null;

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        window.goToLobby = () => {
            const nick = document.getElementById('nickname').value.trim();
            if (!nick) return;
            me.name = nick.toUpperCase();
            document.getElementById('display-nick').innerText = me.name;
            showScreen('screen-lobby');
            listenRooms();
        };

        window.openCreateRoom = () => showScreen('screen-create');
        window.backToLobby = () => showScreen('screen-lobby');

        function showScreen(id) {
            document.querySelectorAll('.ui-screen').forEach(s => s.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        function listenRooms() {
            onValue(ref(db, 'v3/rooms'), (snap) => {
                const rooms = snap.val() || {};
                const list = document.getElementById('room-list');
                list.innerHTML = '';

                const roomIds = Object.keys(rooms);
                if (roomIds.length === 0) {
                    list.innerHTML = '<div class="py-10 text-slate-500 font-bold uppercase italic">NENHUMA SALA ATIVA. CRIE A PRIMEIRA!</div>';
                    return;
                }

                roomIds.forEach(id => {
                    const room = rooms[id];
                    const playerCount = room.players ? Object.keys(room.players).length : 0;
                    
                    if (playerCount === 0) {
                        if (!room.emptySince) {
                            fbUpdate(ref(db, `v3/rooms/${id}`), { emptySince: Date.now() });
                        } else if (Date.now() - room.emptySince > 5 * 60 * 1000) {
                            remove(ref(db, `v3/rooms/${id}`));
                            return;
                        }
                    } else if (room.emptySince) {
                        fbUpdate(ref(db, `v3/rooms/${id}`), { emptySince: null });
                    }

                    const item = document.createElement('div');
                    item.className = 'room-item';
                    item.innerHTML = `
                        <div class="text-left">
                            <div class="font-black text-white italic">${room.name} ${room.hasPass ? '🔒' : ''}</div>
                            <div class="text-[10px] text-slate-500 font-bold uppercase tracking-widest">STATUS: COMBATE EM CURSO</div>
                        </div>
                        <div class="flex items-center gap-4">
                            <div class="text-right">
                                <div class="text-xs font-black text-emerald-400">${playerCount}/${room.max}</div>
                                <div class="text-[8px] text-slate-600 font-bold">SOLDIERS</div>
                            </div>
                            <button onclick="joinRoom('${id}', ${room.hasPass})" class="bg-white text-slate-900 text-[10px] font-black px-4 py-2 rounded-lg hover:bg-emerald-400 transition-all">ENTRAR</button>
                        </div>
                    `;
                    list.appendChild(item);
                });
            });
        }

        window.createRoomNow = async () => {
            const rName = document.getElementById('new-room-name').value.trim() || "ARENA ELITE";
            const rMax = document.getElementById('new-room-max').value;
            const rPass = document.getElementById('new-room-pass').value;

            const roomId = Math.random().toString(36).substring(7);
            const roomRef = ref(db, `v3/rooms/${roomId}`);

            try {
                await set(roomRef, {
                    id: roomId,
                    name: rName.toUpperCase(),
                    max: parseInt(rMax),
                    pass: rPass || null,
                    hasPass: !!rPass, isTdm: document.getElementById('new-room-tdm').checked,
                    createdAt: Date.now(),
                    startTime: Date.now()
                });
                enterMatch(roomId);
            } catch (err) {
                console.error(err);
                alert("ERRO AO CRIAR SALA: Verifique se as permissões (Rules) do seu Realtime Database estão no modo de teste (true/true).");
            }
        };

        window.joinRoom = (id, hasPass) => {
            if (hasPass) {
                const p = prompt("ESTA SALA EXIGE CÓDIGO DE ACESSO:");
                if (!p) return;
                onValue(ref(db, `v3/rooms/${id}/pass`), (snap) => {
                    if (snap.val() === p) enterMatch(id);
                    else alert("CÓDIGO INCORRETO!");
                }, { onlyOnce: true });
            } else {
                enterMatch(id);
            }
        };

        async function enterMatch(roomId) {
            currentRoomId = roomId;
            myId = Math.random().toString(36).substring(7);

            get(ref(db, `v3/rooms/${roomId}`)).then(snap => {
                if (snap.exists()) roomStartTime = snap.val().startTime;
            });

            generateObstacles(roomId);

            const spawn = getSafeSpawn();
            me.x = spawn.x; me.y = spawn.y;
            me.hp = 100; me.targetHp = 100;
            const rData = (await get(ref(db, `v3/rooms/${roomId}`))).val();
            let isTdm = rData.isTdm;
            window.currentRoomIsTdm = isTdm;
            if (isTdm) {
                const count = rData.players ? Object.keys(rData.players).length : 0;
                me.team = (count % 2 === 0) ? 'BLUE' : 'RED';
                document.getElementById('player-name-hud').innerText = `[${me.team}] ${me.name}`;
            }

            const pRef = ref(db, `v3/rooms/${currentRoomId}/players/${myId}`);
            onDisconnect(pRef).remove();
            set(pRef, { id: myId, name: me.name, x: me.x, y: me.y, hp: 100, targetHp: 100, kills: 0, weapon: 1, team: me.team || 'NONE' });

            document.querySelectorAll('.ui-screen').forEach(s => s.classList.add('hidden'));
            document.getElementById('hud').classList.remove('hidden');
            document.getElementById('leaderboard').classList.remove('hidden');
            document.getElementById('player-name-hud').innerText = me.name;
            document.getElementById('chat-container').classList.remove('hidden');
            document.getElementById('audio-btn').classList.remove('hidden');
            me.rank = getRank(myXp);

            active = true;
            window.onbeforeunload = () => remove(pRef);

            initGameNetwork();
            requestAnimationFrame(gameLoop);
        }

        function initGameNetwork() {
            onChildAdded(ref(db, `v3/rooms/${currentRoomId}/chat`), (snap) => {
                const msg = snap.val();
                const el = document.createElement('div');
                el.innerHTML = `<span class="font-bold text-emerald-400">${msg.name}:</span> <span class="text-white">${msg.text}</span>`;
                document.getElementById('chat-messages').prepend(el);
            });
            onValue(ref(db, `v3/rooms/${currentRoomId}/players`), (snap) => {
                const data = snap.val() || {};
                if (myId && data[myId]) {
                    if (data[myId].targetHp !== undefined && data[myId].targetHp !== me.targetHp) {
                        me.targetHp = data[myId].targetHp;
                        if (data[myId].killerX !== undefined) {
                            me.killerPos = { x: data[myId].killerX, y: data[myId].killerY };
                        }
                    }
                }
                players = data;
                updateHUD();
            });

            onChildAdded(ref(db, `v3/rooms/${currentRoomId}/shots`), (snap) => {
                const s = snap.val();
                if (s && s.owner !== myId) {
                    const amIHost = (Object.keys(players).sort()[0] === myId);
                    const isMyBotShot = amIHost && s.owner.startsWith('BOT_');
                    if (!isMyBotShot) createProjectile(s, false);
                }
                remove(ref(db, `v3/rooms/${currentRoomId}/shots/${snap.key}`));
            });
            onChildAdded(ref(db, `v3/rooms/${currentRoomId}/blood`), (snap) => {
                blood.push(snap.val());
            });
        }

        window.leaveRoom = () => {
            if (myId && currentRoomId) {
                remove(ref(db, `v3/rooms/${currentRoomId}/players/${myId}`));
                location.reload();
            }
        };

        function updateGame() {
            if (!active) return;

            if (roomStartTime) {
                const elapsed = Date.now() - roomStartTime;
                const remaining = (15 * 60 * 1000) - elapsed;
                if (remaining <= 0) {
                    alert("A PARTIDA TERMINOU! TEMPO ESGOTADO.");
                    leaveRoom();
                    return;
                }
                const mins = Math.floor(remaining / 60000);
                const secs = Math.floor((remaining % 60000) / 1000);
                document.getElementById('match-timer').innerText = `${mins}:${secs.toString().padStart(2, '0')}`;
            }

            if (me.hp > me.targetHp) {
                me.hp -= 0.5;
                if (me.hp <= me.targetHp) me.hp = me.targetHp;
                updateHUD(); // smooth update locally
            } else if (me.hp < me.targetHp) {
                me.hp = me.targetHp;
            }
            
            for (let id in players) {
                if (players[id].targetHp !== undefined) {
                    if (players[id].hp > players[id].targetHp) players[id].hp -= 0.5;
                    else if (players[id].hp < players[id].targetHp) players[id].hp = players[id].targetHp;
                }
            }

            if (me.hp <= 0) {
                if (active) handleDeath();
                return;
            }

            let mx = 0, my = 0;
            const speed = 5.5;
            
            if (me.dashCooldown > 0) me.dashCooldown--;
            if (keys.ShiftLeft && me.dashCooldown <= 0) {
                me.dashCooldown = 120;
                me.dashTimer = 10;
                me.dashAngle = Math.atan2(mouseY - canvas.height / 2, mouseX - canvas.width / 2);
            }

            if (me.dashTimer > 0) {
                mx = Math.cos(me.dashAngle) * 20;
                my = Math.sin(me.dashAngle) * 20;
                me.dashTimer--;
            } else {
                if (keys.KeyW) my -= speed; if (keys.KeyS) my += speed;
                if (keys.KeyA) mx -= speed; if (keys.KeyD) mx += speed;
                if (mx !== 0 && my !== 0) { mx *= 0.707; my *= 0.707; }
            }

            const nx = Math.max(-MAP_SIZE, Math.min(MAP_SIZE, me.x + mx));
            const ny = Math.max(-MAP_SIZE, Math.min(MAP_SIZE, me.y + my));

            let cx = false, cy = false;
            obstacles.forEach(o => {
                if (checkCol(o, nx, me.y)) cx = true;
                if (checkCol(o, me.x, ny)) cy = true;
            });
            if (!cx) me.x = nx; if (!cy) me.y = ny;

            me.angle = Math.atan2(mouseY - canvas.height / 2, mouseX - canvas.width / 2);

            const w = WEAPONS[me.weapon];
            
            if (me.reloading > 0) {
                me.reloading -= 16;
                if (me.reloading <= 0) {
                    me.clip[me.weapon] = w.clip;
                    updateAmmoDisplay();
                }
            } else if (keys.KeyR && me.clip[me.weapon] < w.clip && me.ammo[me.weapon] > 0) {
                me.reloading = w.reload;
                updateAmmoDisplay();
            } else if (keys.MouseDown && Date.now() - me.lastFired > w.fireRate && me.ammo[me.weapon] > 0 && me.clip[me.weapon] > 0) {
                me.lastFired = Date.now();
                if (w.ammo !== Infinity) me.ammo[me.weapon]--;
                me.clip[me.weapon]--;
                me.shake = w.recoil * 2;
                updateAmmoDisplay();

                for (let i = 0; i < w.count; i++) {
                    const shot = { owner: myId, x: me.x, y: me.y, angle: me.angle + (Math.random() - 0.5) * w.spread, weapon: me.weapon };
                    push(ref(db, `v3/rooms/${currentRoomId}/shots`), shot);
                    createProjectile(shot, true);
                }
                playSound('shoot');
                
                if (me.clip[me.weapon] === 0 && me.ammo[me.weapon] > 0) {
                    me.reloading = w.reload;
                    updateAmmoDisplay();
                }
            }

            if (keys.KeyG && me.grenades > 0 && Date.now() - (me.lastGrenade||0) > 2000) {
                me.grenades--;
                me.lastGrenade = Date.now();
                const shot = { owner: myId, x: me.x, y: me.y, angle: me.angle, weapon: 'grenade' };
                push(ref(db, `v3/rooms/${currentRoomId}/shots`), shot);
                createProjectile(shot, true);
                updateAmmoDisplay();
                playSound('shoot');
            }

                        let inBush = false;
            for (let b of bushes) if (me.x > b.x && me.x < b.x+b.w && me.y > b.y && me.y < b.y+b.h) inBush = true;
            fbUpdate(ref(db, `v3/rooms/${currentRoomId}/players/${myId}`), { x: me.x, y: me.y, angle: me.angle, hp: me.hp, weapon: me.weapon, inBush });
            
            const lookX = me.x + (mouseX - canvas.width / 2) * 0.4;
            const lookY = me.y + (mouseY - canvas.height / 2) * 0.4;
            camera.x += (lookX - camera.x) * 0.1;
            camera.y += (lookY - camera.y) * 0.1;
            
            // Medkits check
            for (let i of items) {
                if (i.active && Math.hypot(me.x - i.x, me.y - i.y) < 30) {
                    i.active = false;
                    me.targetHp = Math.min(100, me.targetHp + 40);
                    playSound('reload');
                }
            }

            // AI Bots logic
            const allIds = Object.keys(players).sort();
            if (allIds[0] === myId) {
                let botCount = Object.values(players).filter(p => p.isBot).length;
                let hCount = Object.values(players).filter(p => !p.isBot).length;
                if (botCount + hCount < 4 && Math.random() < 0.01) {
                    const bId = 'BOT_' + Math.random().toString(36).substring(7);
                    const spawn = getSafeSpawn();
                    let bTeam = 'RED';
                    if (window.currentRoomIsTdm) {
                        const tc = Object.values(players).filter(p => p.team === 'RED').length;
                        bTeam = tc > (botCount+hCount)/2 ? 'BLUE' : 'RED';
                    }
                    set(ref(db, `v3/rooms/${currentRoomId}/players/${bId}`), {
                        id: bId, name: 'CYBORG', x: spawn.x, y: spawn.y, angle: 0, hp: 100, targetHp: 100, kills: 0, weapon: 2, isBot: true, team: bTeam
                    });
                }
                
                for (let id in players) {
                    const p = players[id];
                    if (p.isBot && p.hp > 0) {
                        let nearest = null; let minDist = Infinity;
                        for (let hid in players) {
                            if (players[hid].hp > 0 && id !== hid && (!window.currentRoomIsTdm || players[hid].team !== p.team)) {
                                let d = Math.hypot(p.x - players[hid].x, p.y - players[hid].y);
                                if (d < minDist) { minDist = d; nearest = players[hid]; }
                            }
                        }
                        if (nearest) {
                            let ang = Math.atan2(nearest.y - p.y, nearest.x - p.x);
                            
                            if (p.strafeDir === undefined || Math.random() < 0.02) {
                                p.strafeDir = (Math.random() > 0.5 ? 1 : -1) * (Math.PI / 2.5);
                            }
                            
                            let moveAng = ang;
                            if (minDist < 300) moveAng = ang + p.strafeDir;
                            else if (minDist < 150) moveAng = ang + Math.PI;
                            
                            let nx = p.x + Math.cos(moveAng) * 4.5;
                            let ny = p.y + Math.sin(moveAng) * 4.5;
                            let cx = false, cy = false;
                            obstacles.forEach(o => {
                                if (checkCol(o, nx, p.y)) cx = true;
                                if (checkCol(o, p.x, ny)) cy = true;
                            });
                            if (!cx) p.x = nx; else p.y += (Math.random()-0.5)*15;
                            if (!cy) p.y = ny; else p.x += (Math.random()-0.5)*15;
                            
                            p.angle = ang;
                            if (minDist < 600 && Math.random() < 0.06) {
                                const shot = { owner: id, x: p.x, y: p.y, angle: p.angle + (Math.random()-0.5)*0.3, weapon: p.weapon };
                                push(ref(db, `v3/rooms/${currentRoomId}/shots`), shot);
                                createProjectile(shot, true); // Host generates damage for bots
                            }
                            fbUpdate(ref(db, `v3/rooms/${currentRoomId}/players/${id}`), { x: p.x, y: p.y, angle: p.angle });
                        }
                    } else if (p.isBot && p.hp <= 0 && p.targetHp <= 0 && !p.respawning) {
                        fbUpdate(ref(db, `v3/rooms/${currentRoomId}/players/${id}`), { targetHp: 100, respawning: true });
                        setTimeout(() => {
                           if(active) {
                               const spawn = getSafeSpawn();
                               fbUpdate(ref(db, `v3/rooms/${currentRoomId}/players/${id}`), { x: spawn.x, y: spawn.y, hp: 100, targetHp: 100, respawning: false });
                           }
                        }, 3000);
                    }
                }
            }

            projectiles = projectiles.filter(p => {
                if (p.weapon === 'grenade') {
                    p.x += Math.cos(p.angle) * p.speed;
                    p.y += Math.sin(p.angle) * p.speed;
                    p.speed *= 0.95;
                    p.timer--;
                    
                    for (let i = obstacles.length - 1; i >= 0; i--) {
                        let o = obstacles[i];
                        if (p.x > o.x && p.x < o.x + o.w && p.y > o.y && p.y < o.y + o.h) {
                            if (o.destructible) { o.hp -= 50; if(o.hp<=0) obstacles.splice(i,1); }
                            p.angle += Math.PI / 2;
                            p.x += Math.cos(p.angle) * p.speed * 2;
                            p.y += Math.sin(p.angle) * p.speed * 2;
                        }
                    }
                    
                    if (p.timer <= 0) {
                        createExplosion(p.x, p.y, 200); playSound('explosion');
                        if (p.local) {
                            for (let id in players) {
                                if (players[id].hp > 0) {
                                    const dist = Math.hypot(p.x - players[id].x, p.y - players[id].y);
                                    if (dist < 200) {
                                        const dmg = 150 * (1 - dist / 200);
                                        if (id !== p.owner) damage(id, dmg, p.x, p.y);
                                        else if (p.owner === myId) me.targetHp = Math.max(0, me.targetHp - dmg);
                                    }
                                }
                            }
                        }
                        return false;
                    }
                    return true;
                }
                const w = WEAPONS[p.weapon];
                if (w.accel) p.speed *= w.accel;
                
                p.x += Math.cos(p.angle) * p.speed; 
                p.y += Math.sin(p.angle) * p.speed; 
                p.dist += p.speed;
                
                let hitObstacle = false;
                for (let i = obstacles.length - 1; i >= 0; i--) {
                    let o = obstacles[i];
                    if (p.x > o.x && p.x < o.x + o.w && p.y > o.y && p.y < o.y + o.h) {
                        if (o.destructible) {
                            o.hp -= p.damage;
                            if (o.hp <= 0) {
                                explosions.push({x: o.x+o.w/2, y: o.y+o.h/2, r: 0, maxR: o.w, alpha: 1});
                                obstacles.splice(i, 1);
                                playSound('explosion');
                            }
                        }
                        hitObstacle = true; break;
                    }
                }

                let hitPlayer = false;
                for (let id in players) {
                    if (id !== p.owner && players[id].hp > 0 && Math.hypot(p.x - players[id].x, p.y - players[id].y) < 30) {
                        hitPlayer = true;
                        if (!w.isAoE) {
                            if (p.local) damage(id, p.damage, p.x, p.y);
                            return false;
                        }
                    }
                }

                if (hitObstacle || hitPlayer || p.dist > 1500) {
                    if (w.isAoE) {
                        createExplosion(p.x, p.y, 150); playSound('explosion');
                        if (p.local) {
                            for (let id in players) {
                                if (players[id].hp > 0) {
                                    const dist = Math.hypot(p.x - players[id].x, p.y - players[id].y);
                                    if (dist < 150) {
                                        const dmg = p.damage * (1 - dist / 150);
                                        if (id !== p.owner) damage(id, dmg, p.x, p.y);
                                        else if (p.owner === myId) me.targetHp = Math.max(0, me.targetHp - dmg);
                                    }
                                }
                            }
                        }
                    }
                    return false;
                }
                return true;
            });

            if (me.shake > 0) me.shake *= 0.9;
        }

        function createExplosion(x, y, radius) {
            explosions.push({ x, y, r: 0, maxR: radius, alpha: 1 });
        }

        function createProjectile(d, local) {
            if (d.weapon === 'grenade') {
                projectiles.push({ ...d, speed: 12, timer: 120, local, color: '#10b981' });
                return;
            }
            const w = WEAPONS[d.weapon];
            projectiles.push({ ...d, speed: w.speed, damage: w.damage, local, dist: 0, color: w.color });
        }

        function damage(id, dmg, sourceX, sourceY) {
            const targetRef = ref(db, `v3/rooms/${currentRoomId}/players/${id}`);
            get(targetRef).then(snap => {
                if (!snap.exists()) return;
                const p = snap.val();
                const currentTarget = p.targetHp !== undefined ? p.targetHp : p.hp;
                if (window.currentRoomIsTdm && p.team === me.team && id !== myId) return;
                const newTarget = Math.max(0, currentTarget - dmg);
                push(ref(db, `v3/rooms/${currentRoomId}/blood`), {x: p.x, y: p.y});
                const up = { targetHp: newTarget };
                if (newTarget === 0 && currentTarget > 0) {
                    me.kills++; 
                    myXp++; localStorage.setItem('blocky_xp', myXp);
                    me.rank = getRank(myXp);
                    me.streak++;
                    if (me.streak === 3) push(ref(db, `v3/rooms/${currentRoomId}/chat`), { name: 'SISTEMA', text: `${me.name} ESTÁ IMPARÁVEL (3 KILLS)!` });
                    if (me.streak === 5) push(ref(db, `v3/rooms/${currentRoomId}/chat`), { name: 'SISTEMA', text: `${me.name} É UM DEUS DA GUERRA (5 KILLS)!` });
                    
                    fbUpdate(ref(db, `v3/rooms/${currentRoomId}/players/${myId}`), { kills: me.kills, rank: me.rank });
                    notify(me.name, p.name);
                    up.killerX = sourceX;
                    up.killerY = sourceY;
                }
                fbUpdate(targetRef, up);
            });
        }

        function checkCol(r, cx, cy) {
            const x = Math.max(r.x, Math.min(cx, r.x + r.w));
            const y = Math.max(r.y, Math.min(cy, r.y + r.h));
            return Math.hypot(cx - x, cy - y) < 22;
        }

        function updateHUD() {
            if (!myId || !players[myId]) return;
            const hp = Math.ceil(me.hp); // using me.hp instead of remote for smooth update
            document.getElementById('hp-bar-inner').style.width = hp + '%';
            document.getElementById('hp-text').innerText = hp + '%';
            document.getElementById('kills-val').innerText = players[myId].kills;

            const list = Object.values(players).sort((a, b) => b.kills - a.kills).slice(0, 5);
            document.getElementById('leaderboard-list').innerHTML = list.map((p, i) => `
                <div class="flex justify-between text-[10px] ${p.id === myId ? 'text-emerald-400 font-bold' : 'text-slate-400'}">
                    <span>${i + 1}. ${p.name}</span><span>${p.kills}</span>
                </div>
            `).join('');
            if (hp <= 0 && active) handleDeath();
        }

        function handleDeath() {
            active = false;
            me.hp = 0; me.streak = 0;
            updateHUD();
            
            let counter = 5;
            document.getElementById('respawn-timer').innerText = counter;
            showScreen('screen-death');
            
            const interval = setInterval(() => {
                counter--;
                document.getElementById('respawn-timer').innerText = counter;
                if (counter <= 0) {
                    clearInterval(interval);
                    
                    me.ammo = { 1: Infinity, 2: 150, 3: 30, 4: 10, 5: 5 };
                    
                    let spawn;
                    if (me.killerPos) {
                        spawn = getSafeSpawn(me.killerPos.x, me.killerPos.y, true);
                    } else {
                        spawn = getSafeSpawn();
                    }
                    me.x = spawn.x; me.y = spawn.y;
                    me.hp = 100; me.targetHp = 100;
                    me.killerPos = null;
                    
                    document.getElementById('screen-death').classList.add('hidden');
                    active = true;
                    fbUpdate(ref(db, `v3/rooms/${currentRoomId}/players/${myId}`), { x: me.x, y: me.y, hp: 100, targetHp: 100 });
                    updateAmmoDisplay();
                }
            }, 1000);
        }

        function updateAmmoDisplay() {
            const v = me.ammo[me.weapon];
            let txt = `${me.clip[me.weapon]} / ${v === Infinity ? '∞' : v}`;
            if (me.reloading > 0) txt = "RECARREGANDO...";
            document.getElementById('ammo-val').innerText = txt;
        }

        function notify(k, v) {
            const el = document.createElement('div'); el.className = 'kill-msg';
            el.innerHTML = `<span class="text-white">${k}</span> <span class="text-slate-500 italic">eliminou</span> <span class="text-red-400">${v}</span>`;
            document.getElementById('kill-feed').appendChild(el);
            setTimeout(() => el.remove(), 4000);
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.save();
            const sx = (Math.random() - 0.5) * me.shake; const sy = (Math.random() - 0.5) * me.shake;
            ctx.translate(canvas.width / 2 - camera.x + sx, canvas.height / 2 - camera.y + sy);

            ctx.strokeStyle = '#0f172a'; ctx.lineWidth = 2;
            for (let i = -MAP_SIZE; i <= MAP_SIZE; i += 100) { ctx.beginPath(); ctx.moveTo(i, -MAP_SIZE); ctx.lineTo(i, MAP_SIZE); ctx.stroke(); ctx.beginPath(); ctx.moveTo(-MAP_SIZE, i); ctx.lineTo(MAP_SIZE, i); ctx.stroke(); }
            ctx.strokeStyle = '#ef4444'; ctx.lineWidth = 10; ctx.strokeRect(-MAP_SIZE, -MAP_SIZE, MAP_SIZE * 2, MAP_SIZE * 2);

            obstacles.forEach(o => {
                if (o.destructible) { ctx.fillStyle = '#854d0e'; ctx.fillRect(o.x, o.y, o.w, o.h); }
                else { ctx.fillStyle = '#1e293b'; ctx.fillRect(o.x, o.y, o.w, o.h); }
            });
            items.forEach(i => {
                if(i.active) {
                    ctx.fillStyle = '#ffffff'; ctx.fillRect(i.x-15, i.y-15, 30, 30);
                    ctx.fillStyle = '#ef4444'; ctx.fillRect(i.x-10, i.y-4, 20, 8); ctx.fillRect(i.x-4, i.y-10, 8, 20);
                }
            });
            ctx.fillStyle = 'rgba(34, 197, 94, 0.3)'; bushes.forEach(b => ctx.fillRect(b.x, b.y, b.w, b.h));
            ctx.fillStyle = 'rgba(185, 28, 28, 0.6)'; blood.forEach(b => { ctx.beginPath(); ctx.arc(b.x, b.y, 10, 0, Math.PI*2); ctx.fill(); });


            for (let id in players) if (players[id].hp > 0) {
                drawSoldier(players[id], id === myId);
                const w = WEAPONS[players[id].weapon];
                if (w && w.laser) {
                    ctx.beginPath();
                    ctx.strokeStyle = 'rgba(239, 68, 68, 0.4)';
                    ctx.lineWidth = 1.5;
                    ctx.moveTo(players[id].x, players[id].y);
                    ctx.lineTo(players[id].x + Math.cos(players[id].angle) * 1500, players[id].y + Math.sin(players[id].angle) * 1500);
                    ctx.stroke();
                }
            }
            
            projectiles.forEach(p => { 
                ctx.beginPath(); 
                ctx.strokeStyle = p.color; 
                ctx.lineWidth = 4; 
                ctx.moveTo(p.x, p.y); 
                ctx.lineTo(p.x - Math.cos(p.angle) * 20, p.y - Math.sin(p.angle) * 20); 
                ctx.stroke(); 
            });

            explosions = explosions.filter(e => {
                e.r += 10;
                e.alpha -= 0.05;
                if (e.alpha <= 0) return false;
                ctx.beginPath();
                ctx.arc(e.x, e.y, e.r, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(251, 191, 36, ${e.alpha})`;
                ctx.fill();
                return true;
            });
            
            // Draw Zone
            let zoneRadius = MAP_SIZE * 2;
            if (roomStartTime) {
                const elapsed = Date.now() - roomStartTime;
                zoneRadius = Math.max(200, MAP_SIZE * 1.5 - (elapsed / 1000) * 2);
                ctx.beginPath();
                ctx.arc(0, 0, zoneRadius, 0, Math.PI * 2);
                ctx.strokeStyle = '#ef4444'; ctx.lineWidth = 10; ctx.stroke();
                ctx.fillStyle = 'rgba(239, 68, 68, 0.1)';
                ctx.fillRect(-MAP_SIZE*2, -MAP_SIZE*2, MAP_SIZE*4, MAP_SIZE*4);
                ctx.globalCompositeOperation = 'destination-out';
                ctx.fill();
                ctx.globalCompositeOperation = 'source-over';
                
                if (active && Math.hypot(me.x, me.y) > zoneRadius && Math.random() < 0.1) {
                    me.targetHp -= 1; // Gas damage
                }
            }
            


            ctx.restore();
            
            // Draw Minimap
            ctx.save();
            ctx.translate(canvas.width - 170, 20);
            ctx.fillStyle = 'rgba(15, 23, 42, 0.8)';
            ctx.fillRect(0, 0, 150, 150);
            ctx.strokeStyle = '#10b981'; ctx.strokeRect(0, 0, 150, 150);
            ctx.scale(150 / (MAP_SIZE * 2), 150 / (MAP_SIZE * 2));
            ctx.translate(MAP_SIZE, MAP_SIZE);
            ctx.fillStyle = '#475569';
            obstacles.forEach(o => ctx.fillRect(o.x, o.y, o.w, o.h));
            ctx.fillStyle = '#10b981';
            ctx.fillRect(me.x - 50, me.y - 50, 100, 100);
            for (let id in players) {
                if (id !== myId && players[id].hp > 0 && !players[id].inBush) {
                    ctx.fillStyle = '#ef4444';
                    ctx.fillRect(players[id].x - 50, players[id].y - 50, 100, 100);
                }
            }
            if (zoneRadius < MAP_SIZE*2) {
                ctx.beginPath(); ctx.arc(0, 0, zoneRadius, 0, Math.PI*2);
                ctx.strokeStyle = '#ef4444'; ctx.lineWidth = 40; ctx.stroke();
            }
            ctx.restore();
        }

        function drawSoldier(p, isMe) {
            ctx.save(); ctx.translate(p.x, p.y); if (p.inBush && !isMe) ctx.globalAlpha = 0.2;
            ctx.textAlign = 'center'; ctx.font = 'bold 10px Orbitron'; ctx.fillStyle = isMe ? '#10b981' : '#fff';
            ctx.fillText(p.name, 0, -40); ctx.rotate(p.angle);
            ctx.fillStyle = '#475569'; ctx.fillRect(20, -4, 25, 8);
            const g = ctx.createRadialGradient(0, 0, 5, 0, 0, 22);
            g.addColorStop(0, isMe ? '#10b981' : '#ef4444'); g.addColorStop(1, isMe ? '#064e3b' : '#7f1d1d');
            ctx.fillStyle = g; ctx.beginPath(); ctx.arc(0, 0, 22, 0, Math.PI * 2); ctx.fill();
            ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.stroke();
            ctx.restore();
        }

        function generateObstacles(seedStr) {
            obstacles = []; bushes = []; items = [];
            const rnd = mulberry32(hashCode(seedStr || "default"));
            for (let i = 0; i < 30; i++) {
                obstacles.push({ x: (rnd() - 0.5) * MAP_SIZE * 1.8, y: (rnd() - 0.5) * MAP_SIZE * 1.8, w: 80 + rnd() * 100, h: 80 + rnd() * 100 });
            }
            for (let i = 0; i < 20; i++) {
                bushes.push({ x: (rnd() - 0.5) * MAP_SIZE * 1.8, y: (rnd() - 0.5) * MAP_SIZE * 1.8, w: 120 + rnd() * 100, h: 120 + rnd() * 100 });
            }
            for (let i = 0; i < 20; i++) {
                obstacles.push({ x: (rnd() - 0.5) * MAP_SIZE * 1.8, y: (rnd() - 0.5) * MAP_SIZE * 1.8, w: 60, h: 60, destructible: true, hp: 100 });
            }
            for (let i = 0; i < 15; i++) {
                items.push({ x: (rnd() - 0.5) * MAP_SIZE * 1.8, y: (rnd() - 0.5) * MAP_SIZE * 1.8, active: true });
            }
        }

        function getSafeSpawn(avoidX = 0, avoidY = 0, avoidDist = false) {
            let x = 0, y = 0, safe = false;
            let attempts = 0;
            while (!safe && attempts < 100) {
                const rad = Math.random() * (MAP_SIZE * 0.9);
                const ang = Math.random() * Math.PI * 2;
                x = rad * Math.cos(ang); 
                y = rad * Math.sin(ang);
                
                safe = true;
                for (let o of obstacles) {
                    if (x > o.x - 30 && x < o.x + o.w + 30 && y > o.y - 30 && y < o.y + o.h + 30) {
                        safe = false; break;
                    }
                }
                if (safe && avoidDist) {
                    if (Math.hypot(x - avoidX, y - avoidY) < 800) safe = false;
                }
                attempts++;
            }
            return { x, y };
        }

        window.addEventListener('keydown', e => {
            if (e.code === 'Tab') {
                e.preventDefault();
                document.getElementById('tab-scoreboard').classList.remove('hidden');
                const list = Object.values(players).sort((a, b) => b.kills - a.kills);
                document.getElementById('tab-list').innerHTML = list.map((p, i) => `
                    <div class="flex justify-between items-center p-3 border-b border-slate-700 bg-slate-800/50 rounded">
                        <div class="font-bold ${p.id === myId ? 'text-emerald-400' : 'text-white'}">${i+1}. [${p.rank || 'RECRUTA'}] ${p.name}</div>
                        <div class="font-black text-xl">${p.kills} <span class="text-xs text-slate-400">KILLS</span></div>
                    </div>
                `).join('');
            }
            if (e.code === 'KeyT' && document.activeElement !== document.getElementById('chat-input')) {
                e.preventDefault();
                document.getElementById('chat-input').focus();
            }
            if (e.code === 'Enter' && document.activeElement === document.getElementById('chat-input')) {
                const input = document.getElementById('chat-input');
                if (input.value.trim()) {
                    push(ref(db, `v3/rooms/${currentRoomId}/chat`), { name: me.name, text: input.value.trim() });
                    input.value = '';
                }
                input.blur();
            }
            
            if (document.activeElement !== document.getElementById('chat-input') && document.activeElement !== document.getElementById('nickname') && document.activeElement !== document.getElementById('new-room-name') && document.activeElement !== document.getElementById('new-room-pass')) {
                keys[e.code] = true;
                if (e.code.includes('Digit')) {
                    const d = e.code.replace('Digit', '');
                    if (WEAPONS[d]) {
                        me.weapon = d;
                        document.querySelectorAll('.weapon-slot').forEach(s => s.classList.remove('active'));
                        document.getElementById(`w-${d}`).classList.add('active');
                        updateAmmoDisplay();
                    }
                }
            }
        });
        window.addEventListener('keyup', e => {
            if (e.code === 'Tab') document.getElementById('tab-scoreboard').classList.add('hidden');
            keys[e.code] = false;
        });
        window.addEventListener('mousemove', e => { mouseX = e.clientX; mouseY = e.clientY; });
        window.addEventListener('mousedown', () => keys.MouseDown = true);
        window.addEventListener('mouseup', () => keys.MouseDown = false);

        function gameLoop() { if (active) updateGame(); draw(); requestAnimationFrame(gameLoop); }

        resize();
    </script>
</body>
</html>
