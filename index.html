<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Arena 2D - Elite Warzone</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=JetBrains+Mono:wght@400;700&display=swap');
        
        :root {
            --primary: #10b981;
            --danger: #ef4444;
            --bg: #020617;
        }

        body {
            margin: 0;
            background-color: var(--bg);
            color: #f8fafc;
            font-family: 'Orbitron', sans-serif;
            overflow: hidden;
            touch-action: none;
            user-select: none;
        }

        canvas {
            display: block;
            cursor: crosshair;
        }

        /* --- UI OVERLAYS --- */
        #menu {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle, rgba(16, 185, 129, 0.1) 0%, rgba(2, 6, 23, 1) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            pointer-events: auto;
        }

        .menu-card {
            background: rgba(15, 23, 42, 0.9);
            padding: 3rem;
            border-radius: 2rem;
            border: 2px solid rgba(16, 185, 129, 0.4);
            box-shadow: 0 0 80px rgba(0, 0, 0, 0.8), 0 0 20px rgba(16, 185, 129, 0.2);
            text-align: center;
            max-width: 450px;
            width: 100%;
        }

        #hud {
            position: absolute;
            bottom: 30px;
            left: 30px;
            right: 30px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            pointer-events: none;
            z-index: 50;
        }

        .hud-panel {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 15px 25px;
            border-radius: 15px;
        }

        .hp-bar-outer {
            width: 250px;
            height: 12px;
            background: #0f172a;
            border-radius: 6px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            overflow: hidden;
            margin-top: 5px;
        }

        #hp-bar-inner {
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, #10b981, #34d399);
            transition: width 0.2s ease-out;
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.5);
        }

        #leaderboard {
            position: absolute;
            top: 25px;
            right: 25px;
            background: rgba(15, 23, 42, 0.85);
            border: 1px solid rgba(16, 185, 129, 0.3);
            padding: 15px;
            border-radius: 12px;
            min-width: 220px;
            font-family: 'JetBrains Mono', monospace;
        }

        .weapon-slot {
            padding: 8px 12px;
            border-radius: 8px;
            background: #1e293b;
            border: 1px solid #334155;
            font-size: 10px;
            color: #94a3b8;
            transition: all 0.2s;
        }
        .weapon-slot.active {
            background: #064e3b;
            border-color: #10b981;
            color: white;
            transform: scale(1.1);
        }

        .kill-feed-container {
            position: absolute;
            top: 25px;
            left: 25px;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .kill-msg {
            background: rgba(239, 68, 68, 0.2);
            padding: 5px 15px;
            border-radius: 4px;
            border-left: 3px solid #ef4444;
            font-size: 12px;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        #dash-cooldown-ui {
            position: relative;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #1e293b;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 15px;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="menu">
        <div class="menu-card animate-enter">
            <h1 class="text-5xl font-black mb-1 text-emerald-400 italic tracking-tighter">ELITE ARENA</h1>
            <p class="text-slate-400 text-xs mb-10 uppercase tracking-widest font-bold">Protocolo Warzone Online</p>
            
            <div class="space-y-4 mb-8">
                <input type="text" id="nickname" maxlength="10" placeholder="IDENTIFICAÇÃO" 
                       class="w-full p-4 bg-slate-950 border-2 border-slate-800 rounded-xl outline-none focus:border-emerald-500 text-center font-bold tracking-widest text-emerald-100 transition-all uppercase">
            </div>
            
            <button onclick="deploySoldier()" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-black py-5 rounded-xl transition-all transform active:scale-95 shadow-[0_6px_0_rgb(5,150,105)] active:shadow-none active:translate-y-1 text-xl tracking-widest">
                INICIAR DEPLOY
            </button>
            
            <div class="mt-10 grid grid-cols-2 gap-4 text-[10px] text-slate-500 uppercase font-bold">
                <div class="bg-slate-950 p-3 rounded-xl border border-slate-800">MOVIMENTAÇÃO: WASD</div>
                <div class="bg-slate-950 p-3 rounded-xl border border-slate-800">MIRAR: MOUSE</div>
                <div class="bg-slate-950 p-3 rounded-xl border border-slate-800">ATIRAR: CLIQUE</div>
                <div class="bg-slate-950 p-3 rounded-xl border border-slate-800">DASH: ESPAÇO</div>
            </div>
        </div>
    </div>

    <div id="leaderboard">
        <div class="text-[10px] text-emerald-400 font-black uppercase mb-3 border-b border-emerald-500/20 pb-2 flex justify-between">
            <span>🏆 Ranking Global</span>
            <span>Kills</span>
        </div>
        <div id="leaderboard-list" class="space-y-1"></div>
    </div>

    <div id="kill-feed" class="kill-feed-container"></div>

    <div id="hud">
        <div class="flex items-end gap-6">
            <div class="hud-panel">
                <div class="flex justify-between items-center mb-1">
                    <span id="player-name-hud" class="text-xs font-bold text-slate-400 uppercase tracking-tighter">SISTEMAS ONLINE</span>
                    <span id="hp-text" class="text-sm font-black text-emerald-400 italic">100%</span>
                </div>
                <div class="hp-bar-outer">
                    <div id="hp-bar-inner"></div>
                </div>
            </div>
            <div class="hud-panel flex gap-4">
                <div class="text-center">
                    <div class="text-[8px] text-slate-500 font-bold uppercase mb-1">Combat Kills</div>
                    <div id="kills-val" class="text-2xl font-black text-white italic leading-none">0</div>
                </div>
            </div>
        </div>

        <div class="flex items-end gap-3">
            <div id="dash-cooldown-ui" class="border-2 border-slate-700">
                <span class="text-[10px] font-bold">SPACE</span>
            </div>
            <div class="hud-panel flex gap-2" id="weapon-ui">
                <div class="weapon-slot active" id="w-1">1: PISTOL</div>
                <div class="weapon-slot" id="w-2">2: SMG</div>
                <div class="weapon-slot" id="w-3">3: SHOTGUN</div>
                <div class="weapon-slot" id="w-4">4: SNIPER</div>
            </div>
            <div class="hud-panel min-w-[100px] text-right">
                <div class="text-[8px] text-slate-500 font-bold uppercase mb-1">Munição</div>
                <div id="ammo-val" class="text-3xl font-black text-emerald-400 italic leading-none">∞</div>
            </div>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, push, remove, update as firebaseUpdate, onChildAdded } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // =========================================================================
        // CONFIGURAÇÃO DO FIREBASE (PASSO 2 E 3)
        // =========================================================================
        const firebaseConfig = {
            apiKey: "AIzaSyD1IOecLLpWh-wKiSSy0XrsorKZDaMUaxM",
            authDomain: "blocky-fps.firebaseapp.com",
            projectId: "blocky-fps",
            storageBucket: "blocky-fps.firebasestorage.app",
            messagingSenderId: "513239085323",
            appId: "1:513239085323:web:2290f74dc9bb330388f20e",
            measurementId: "G-3J1SNCEW8B"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        const WEAPONS = {
            1: { name: 'Pistol', damage: 20, fireRate: 400, ammo: Infinity, speed: 14, spread: 0.02, recoil: 2, count: 1, color: '#f59e0b' },
            2: { name: 'SMG', damage: 12, fireRate: 100, ammo: 150, speed: 16, spread: 0.1, recoil: 1.5, count: 1, color: '#10b981' },
            3: { name: 'Shotgun', damage: 15, fireRate: 800, ammo: 30, speed: 12, spread: 0.4, recoil: 8, count: 6, color: '#ef4444' },
            4: { name: 'Sniper', damage: 85, fireRate: 1500, ammo: 10, speed: 28, spread: 0, recoil: 15, count: 1, color: '#6366f1' }
        };

        let myId = null;
        let active = false;
        let players = {};
        let projectiles = [];
        let particles = [];
        let obstacles = [];
        let items = {};
        const MAP_SIZE = 1500;
        
        const keys = {};
        let mouseX = 0, mouseY = 0;

        let me = {
            x: 0, y: 0, angle: 0, hp: 100, kills: 0, name: "",
            weapon: 1, lastFired: 0, ammo: { 1: Infinity, 2: 150, 3: 30, 4: 10 },
            dashCooldown: 0, dashActive: 0, dashDir: {x:0, y:0},
            shake: 0, lastHp: 100, hitFlash: 0
        };

        let camera = { x: 0, y: 0 };

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        window.deploySoldier = () => {
            const nick = document.getElementById('nickname').value.trim() || "MERCENÁRIO";
            me.name = nick.toUpperCase();
            
            const rad = Math.random() * 100;
            const ang = Math.random() * Math.PI * 2;
            me.x = rad * Math.cos(ang);
            me.y = rad * Math.sin(ang);

            myId = Math.random().toString(36).substring(7);
            const pRef = ref(db, `v2/players/${myId}`);
            
            set(pRef, {
                id: myId, name: me.name, x: me.x, y: me.y, 
                angle: 0, hp: 100, kills: 0, weapon: 1
            });

            document.getElementById('menu').style.display = 'none';
            document.getElementById('player-name-hud').innerText = me.name;
            active = true;

            window.onbeforeunload = () => remove(pRef);
            initListeners();
            generateMapLocal();
            requestAnimationFrame(gameLoop);
        };

        function generateMapLocal() {
            obstacles = [];
            for(let i=0; i<35; i++) {
                obstacles.push({
                    x: (Math.random() - 0.5) * (MAP_SIZE * 1.8),
                    y: (Math.random() - 0.5) * (MAP_SIZE * 1.8),
                    w: 70 + Math.random() * 100,
                    h: 70 + Math.random() * 100
                });
            }
        }

        function initListeners() {
            window.addEventListener('keydown', e => {
                keys[e.code] = true;
                if(e.code === 'Digit1') switchWeapon(1);
                if(e.code === 'Digit2') switchWeapon(2);
                if(e.code === 'Digit3') switchWeapon(3);
                if(e.code === 'Digit4') switchWeapon(4);
                if(e.code === 'Space') triggerDash();
            });
            window.addEventListener('keyup', e => keys[e.code] = false);
            window.addEventListener('mousemove', e => { mouseX = e.clientX; mouseY = e.clientY; });
            window.addEventListener('mousedown', () => keys.MouseDown = true);
            window.addEventListener('mouseup', () => keys.MouseDown = false);

            onValue(ref(db, 'v2/players'), (snap) => {
                players = snap.val() || {};
                updateLeaderboardUI();
                if(myId && players[myId]) {
                    if(players[myId].hp < me.lastHp) {
                        me.hitFlash = 8;
                        me.shake = 10;
                    }
                    me.lastHp = players[myId].hp;
                    if(players[myId].hp <= 0 && me.hp > 0) handleDeath();
                    me.kills = players[myId].kills;
                }
            });

            onChildAdded(ref(db, 'v2/shots'), (snap) => {
                const s = snap.val();
                if(s && s.owner !== myId) createProjectile(s, false);
                remove(ref(db, `v2/shots/${snap.key}`));
            });

            onValue(ref(db, 'v2/items'), (snap) => { items = snap.val() || {}; });
        }

        function switchWeapon(id) {
            me.weapon = id;
            document.querySelectorAll('.weapon-slot').forEach(s => s.classList.remove('active'));
            document.getElementById(`w-${id}`).classList.add('active');
            updateAmmoUI();
        }

        function updateAmmoUI() {
            const val = me.ammo[me.weapon];
            document.getElementById('ammo-val').innerText = val === Infinity ? '∞' : val;
        }

        function triggerDash() {
            if(me.dashCooldown > 0 || me.hp <= 0) return;
            me.dashActive = 10; 
            me.dashCooldown = 90;
            let dx = 0, dy = 0;
            if(keys.KeyW) dy -= 1; if(keys.KeyS) dy += 1;
            if(keys.KeyA) dx -= 1; if(keys.KeyD) dx += 1;
            if(dx === 0 && dy === 0) { dx = Math.cos(me.angle); dy = Math.sin(me.angle); }
            const mag = Math.hypot(dx, dy);
            me.dashDir = { x: dx/mag, y: dy/mag };
            spawnParticles(me.x, me.y, '#ffffff', 15);
        }

        function updateGameLogic() {
            if(!active || me.hp <= 0) return;

            let moveX = 0, moveY = 0;
            const speed = me.dashActive > 0 ? 22 : 5.5;
            
            if(me.dashActive > 0) {
                moveX = me.dashDir.x * speed;
                moveY = me.dashDir.y * speed;
                me.dashActive--;
                spawnParticles(me.x, me.y, 'rgba(255,255,255,0.3)', 1);
            } else {
                if(keys.KeyW) moveY -= speed; if(keys.KeyS) moveY += speed;
                if(keys.KeyA) moveX -= speed; if(keys.KeyD) moveX += speed;
                if(moveX !== 0 && moveY !== 0) { moveX *= 0.707; moveY *= 0.707; }
            }

            const nextX = Math.max(-MAP_SIZE, Math.min(MAP_SIZE, me.x + moveX));
            const nextY = Math.max(-MAP_SIZE, Math.min(MAP_SIZE, me.y + moveY));
            
            let collideX = false, collideY = false;
            for(const obj of obstacles) {
                if(checkRectCircle(obj, nextX, me.y, 22)) collideX = true;
                if(checkRectCircle(obj, me.x, nextY, 22)) collideY = true;
            }

            if(!collideX) me.x = nextX;
            if(!collideY) me.y = nextY;

            me.angle = Math.atan2(mouseY - canvas.height/2, mouseX - canvas.width/2);

            const w = WEAPONS[me.weapon];
            if(keys.MouseDown && Date.now() - me.lastFired > w.fireRate && me.ammo[me.weapon] > 0) {
                fireWeapon();
            }

            if(me.dashCooldown > 0) me.dashCooldown--;
            if(me.shake > 0) me.shake *= 0.88;
            if(me.hitFlash > 0) me.hitFlash--;

            for(let id in items) {
                if(Math.hypot(me.x - items[id].x, me.y - items[id].y) < 40) collectItem(id, items[id]);
            }

            firebaseUpdate(ref(db, `v2/players/${myId}`), {
                x: me.x, y: me.y, angle: me.angle, hp: me.hp, weapon: me.weapon
            });

            camera.x += (me.x - camera.x) * 0.1;
            camera.y += (me.y - camera.y) * 0.1;

            updateProjectiles();
            updateParticles();
        }

        function fireWeapon() {
            const w = WEAPONS[me.weapon];
            me.lastFired = Date.now();
            if(w.ammo !== Infinity) me.ammo[me.weapon]--;
            updateAmmoUI();
            me.shake = w.recoil * 1.5;

            for(let i=0; i < w.count; i++) {
                const spreadAng = me.angle + (Math.random() - 0.5) * w.spread;
                const shot = {
                    owner: myId, x: me.x + Math.cos(me.angle)*25, y: me.y + Math.sin(me.angle)*25,
                    angle: spreadAng, weapon: me.weapon, time: Date.now()
                };
                push(ref(db, 'v2/shots'), shot);
                createProjectile(shot, true);
            }
            spawnParticles(me.x + Math.cos(me.angle)*30, me.y + Math.sin(me.angle)*30, '#cbd5e1', 5);
        }

        function createProjectile(data, isLocal) {
            const w = WEAPONS[data.weapon];
            projectiles.push({ ...data, speed: w.speed, damage: w.damage, local: isLocal, dist: 0, color: w.color });
        }

        function updateProjectiles() {
            projectiles = projectiles.filter(p => {
                p.x += Math.cos(p.angle) * p.speed;
                p.y += Math.sin(p.angle) * p.speed;
                p.dist += p.speed;

                for(const obj of obstacles) {
                    if(p.x > obj.x && p.x < obj.x + obj.w && p.y > obj.y && p.y < obj.y + obj.h) {
                        spawnParticles(p.x, p.y, '#475569', 4);
                        return false;
                    }
                }

                if(p.local) {
                    for(let id in players) {
                        if(id !== myId && players[id].hp > 0) {
                            if(Math.hypot(p.x - players[id].x, p.y - players[id].y) < 28) {
                                damageEnemy(id, p.damage);
                                spawnParticles(p.x, p.y, '#ef4444', 12);
                                return false;
                            }
                        }
                    }
                }
                return p.dist < 1400;
            });
        }

        function damageEnemy(id, dmg) {
            const newHp = Math.max(0, players[id].hp - dmg);
            const up = {};
            up[`v2/players/${id}/hp`] = newHp;
            if(newHp === 0 && players[id].hp > 0) {
                me.kills++;
                up[`v2/players/${myId}/kills`] = me.kills;
                notifyKill(me.name, players[id].name);
            }
            firebaseUpdate(ref(db), up);
        }

        function collectItem(id, item) {
            if(item.type === 'hp') me.hp = Math.min(100, me.hp + 45);
            else { me.ammo[2] += 60; me.ammo[3] += 12; me.ammo[4] += 5; updateAmmoUI(); }
            remove(ref(db, `v2/items/${id}`));
            spawnParticles(me.x, me.y, item.type === 'hp' ? '#10b981' : '#f59e0b', 25);
        }

        function handleDeath() {
            active = false; me.hp = 0;
            spawnParticles(me.x, me.y, '#ef4444', 60);
            setTimeout(() => {
                const rad = Math.random() * 120;
                const ang = Math.random() * Math.PI * 2;
                me.x = rad * Math.cos(ang); me.y = rad * Math.sin(ang);
                me.hp = 100; me.lastHp = 100;
                me.ammo = { 1: Infinity, 2: 150, 3: 30, 4: 10 };
                active = true;
                firebaseUpdate(ref(db, `v2/players/${myId}`), { x: me.x, y: me.y, hp: 100 });
                updateAmmoUI();
            }, 3000);
        }

        function spawnParticles(x, y, color, count) {
            for(let i=0; i<count; i++) {
                particles.push({
                    x, y, vx: (Math.random()-0.5)*12, vy: (Math.random()-0.5)*12,
                    life: 1.0, decay: 0.015+Math.random()*0.03, color: color, size: 3+Math.random()*5
                });
            }
        }

        function updateParticles() {
            particles = particles.filter(p => {
                p.x += p.vx; p.y += p.vy; p.life -= p.decay;
                return p.life > 0;
            });
        }

        function checkRectCircle(rect, cx, cy, radius) {
            const cX = Math.max(rect.x, Math.min(cx, rect.x + rect.w));
            const cY = Math.max(rect.y, Math.min(cy, rect.y + rect.h));
            return Math.hypot(cx - cX, cy - cY) < radius;
        }

        function updateLeaderboardUI() {
            const sorted = Object.values(players).sort((a,b) => (b.kills||0) - (a.kills||0)).slice(0, 10);
            document.getElementById('leaderboard-list').innerHTML = sorted.map((p, i) => `
                <div class="flex justify-between items-center text-[10px] ${p.id === myId ? 'text-emerald-400 font-bold' : 'text-slate-400'}">
                    <span>${i+1}. ${p.name}</span>
                    <span>${p.kills || 0}</span>
                </div>
            `).join('');

            if(myId && players[myId]) {
                const hp = players[myId].hp;
                me.hp = hp;
                const bar = document.getElementById('hp-bar-inner');
                bar.style.width = hp + '%';
                document.getElementById('hp-text').innerText = hp + '%';
                document.getElementById('kills-val').innerText = me.kills;
                bar.style.background = hp < 30 ? '#ef4444' : (hp < 60 ? '#f59e0b' : '#10b981');
            }
        }

        function notifyKill(killer, victim) {
            const el = document.createElement('div');
            el.className = 'kill-msg';
            el.innerHTML = `<span class="font-black text-white">${killer}</span> <span class="text-slate-400 italic">aniquilou</span> <span class="text-red-400">${victim}</span>`;
            document.getElementById('kill-feed').appendChild(el);
            setTimeout(() => el.remove(), 4000);
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.save();
            const sx = (Math.random()-0.5)*me.shake;
            const sy = (Math.random()-0.5)*me.shake;
            ctx.translate(canvas.width/2 - camera.x + sx, canvas.height/2 - camera.y + sy);

            // Grid Background
            ctx.strokeStyle = '#0f172a';
            ctx.lineWidth = 2;
            for (let x = -MAP_SIZE; x <= MAP_SIZE; x += 100) { ctx.beginPath(); ctx.moveTo(x, -MAP_SIZE); ctx.lineTo(x, MAP_SIZE); ctx.stroke(); }
            for (let y = -MAP_SIZE; y <= MAP_SIZE; y += 100) { ctx.beginPath(); ctx.moveTo(-MAP_SIZE, y); ctx.lineTo(MAP_SIZE, y); ctx.stroke(); }
            ctx.strokeStyle = '#ef4444'; ctx.lineWidth = 15; ctx.strokeRect(-MAP_SIZE, -MAP_SIZE, MAP_SIZE*2, MAP_SIZE*2);

            // Obstacles
            ctx.fillStyle = '#1e293b'; ctx.strokeStyle = '#334155'; ctx.lineWidth = 4;
            obstacles.forEach(o => { ctx.fillRect(o.x, o.y, o.w, o.h); ctx.strokeRect(o.x, o.y, o.w, o.h); });

            // Items
            for(let id in items) {
                const it = items[id]; ctx.save(); ctx.translate(it.x, it.y); ctx.rotate(Date.now()/400);
                ctx.fillStyle = it.type === 'hp' ? '#10b981' : '#f59e0b'; ctx.shadowBlur = 20; ctx.shadowColor = ctx.fillStyle;
                ctx.fillRect(-14, -14, 28, 28); ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.strokeRect(-14, -14, 28, 28); ctx.restore();
            }

            // Players
            for(let id in players) { if(id !== myId && players[id].hp > 0) drawSoldier(players[id], false); }
            if(me.hp > 0) drawSoldier(me, true);

            // Projectiles
            projectiles.forEach(p => {
                ctx.save(); ctx.beginPath(); ctx.strokeStyle = p.color; ctx.lineWidth = 5; ctx.lineCap = 'round';
                ctx.shadowBlur = 10; ctx.shadowColor = p.color; ctx.moveTo(p.x, p.y);
                ctx.lineTo(p.x - Math.cos(p.angle)*25, p.y - Math.sin(p.angle)*25); ctx.stroke(); ctx.restore();
            });

            // Particles
            particles.forEach(p => { ctx.globalAlpha = p.life; ctx.fillStyle = p.color; ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill(); });
            ctx.restore();
        }

        function drawSoldier(p, isMe) {
            ctx.save();
            ctx.translate(p.x, p.y);
            ctx.textAlign = 'center'; ctx.font = 'bold 12px Orbitron'; ctx.fillStyle = isMe ? '#10b981' : '#fff';
            ctx.fillText(p.name, 0, -45); ctx.fillStyle = '#000'; ctx.fillRect(-22, -40, 44, 6);
            ctx.fillStyle = p.hp > 30 ? '#10b981' : '#ef4444'; ctx.fillRect(-22, -40, (p.hp/100)*44, 6);

            ctx.rotate(p.angle);
            const isFlashing = isMe && me.hitFlash > 0;
            ctx.fillStyle = '#475569';
            if(p.weapon == 4) ctx.fillRect(20, -6, 50, 12); else ctx.fillRect(20, -5, 30, 10);

            const grad = ctx.createRadialGradient(0,0, 6, 0,0, 24);
            grad.addColorStop(0, isMe ? '#10b981' : '#ef4444'); grad.addColorStop(1, isMe ? '#064e3b' : '#7f1d1d');
            ctx.fillStyle = isFlashing ? '#fff' : grad;
            ctx.beginPath(); ctx.arc(0, 0, 24, 0, Math.PI * 2); ctx.fill(); ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.stroke();
            ctx.fillStyle = '#0f172a'; ctx.beginPath(); ctx.arc(12, 9, 6, 0, Math.PI*2); ctx.arc(12, -9, 6, 0, Math.PI*2); ctx.fill();
            ctx.restore();
        }

        function gameLoop() { updateGameLogic(); draw(); requestAnimationFrame(gameLoop); }

        setInterval(() => {
            if(myId && active && Object.keys(items).length < 10) {
                if(Math.random() < 0.3) {
                    const id = Math.random().toString(36).substring(7);
                    set(ref(db, `v2/items/${id}`), {
                        id, x: (Math.random()-0.5)*(MAP_SIZE*1.7), y: (Math.random()-0.5)*(MAP_SIZE*1.7),
                        type: Math.random() > 0.4 ? 'hp' : 'ammo'
                    });
                }
            }
        }, 3500);

    </script>
</body>
